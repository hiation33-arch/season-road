<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Season Road — 계절로 떠나는 여행 코스</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <style>
    :root {
      --primary-500: #22c55e;
      --primary-400: #4ade80;
      --primary-100: #dcfce7;
      --primary-900: #14532d;
      --hallyu-500: #a855f7;
      --hallyu-100: #faf5ff;
      --hallyu-900: #6b21a8;
      --gray-900: #111827;
      --gray-600: #4b5563;
      --gray-400: #5f6b7a;
      --gray-200: #e5e7eb;
      --gray-100: #f3f4f6;
      --white: #ffffff;
      --header-h: 56px;
      --tab-h: 48px;
      --bf-h: 48px;
      --trend-h: 44px;
      --barrier-500: #f59e0b;
      --barrier-100: #fffbeb;
      --barrier-900: #92400e;
      --hp-500: #f59e0b;
      --hp-100: #fef3c7;
      --font: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      --shadow-card: 0 1px 4px rgba(0,0,0,0.08);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.12);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font); background: var(--gray-100); color: var(--gray-900); overflow: hidden; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ── 헤더 ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center; padding: 0 14px; gap: 10px; z-index: 300;
    }
    .logo { font-size: 17px; font-weight: 800; color: var(--primary-500); white-space: nowrap; letter-spacing: -0.5px; flex-shrink: 0; }
    .logo span { color: var(--gray-900); }
    .search-bar {
      flex: 1; display: flex; align-items: center;
      background: var(--gray-100); border-radius: 10px; padding: 0 12px; height: 38px; gap: 8px;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .search-bar.focused { background: var(--white); box-shadow: 0 0 0 2px var(--hallyu-500); }
    .search-bar svg { flex-shrink: 0; color: var(--gray-400); }
    .search-bar input {
      flex: 1; border: none; background: transparent;
      font-family: var(--font); font-size: 14px; color: var(--gray-900); outline: none;
    }
    .search-bar input::placeholder { color: var(--gray-400); }
    .search-clear {
      display: none; border: none; background: none; cursor: pointer;
      color: var(--gray-400); font-size: 16px; line-height: 1; padding: 2px 4px;
      border-radius: 50%; transition: background 0.12s;
    }
    .search-clear:hover { background: var(--gray-200); }

    /* ── 언어 선택 ── */
    .lang-selector { display: flex; gap: 3px; flex-shrink: 0; }
    .lang-btn {
      padding: 4px 7px; border: 1px solid var(--gray-200); border-radius: 6px;
      background: var(--white); font-family: var(--font); font-size: 11px; font-weight: 600;
      color: var(--gray-400); cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .lang-btn:hover { border-color: var(--gray-400); color: var(--gray-600); }
    .lang-btn.active { background: var(--gray-900); color: var(--white); border-color: var(--gray-900); }

    /* ── 탭 바 ── */
    .season-tabs {
      position: fixed; top: var(--header-h); left: 0; right: 0;
      height: var(--tab-h);
      background: var(--white); border-bottom: 1px solid var(--gray-200);
      display: flex; z-index: 300;
    }
    .tab {
      flex: 1; border: none; background: transparent;
      font-family: var(--font); font-size: 14px; font-weight: 500; color: var(--gray-400);
      cursor: pointer; border-bottom: 2.5px solid transparent;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .tab.active[data-s="spring"] { background: #fef9c3; color: #78350f; border-bottom-color: #fde047; font-weight: 700; }
    .tab.active[data-s="summer"] { background: #dcfce7; color: #14532d; border-bottom-color: #4ade80; font-weight: 700; }
    .tab.active[data-s="autumn"] { background: #ffedd5; color: #7c2d12; border-bottom-color: #fb923c; font-weight: 700; }
    .tab.active[data-s="winter"] { background: #e0f2fe; color: #0c4a6e; border-bottom-color: #38bdf8; font-weight: 700; }
    .hallyu-tab.active { background: var(--hallyu-100); color: var(--hallyu-900); border-bottom-color: var(--hallyu-500); font-weight: 700; }

    /* ── 무장애 토글 행 ── */
    .bf-toggle-row {
      position: fixed; top: calc(var(--header-h) + var(--tab-h));
      left: 0; right: 0; height: var(--bf-h);
      background: var(--white); border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center; padding: 0 12px; gap: 8px; z-index: 295;
    }
    .bf-toggle-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 14px; border: 1.5px solid var(--gray-200); border-radius: 20px;
      background: var(--white); font-family: var(--font); font-size: 13px; font-weight: 600;
      color: var(--gray-600); cursor: pointer; white-space: nowrap;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }
    .bf-toggle-btn:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--gray-400);
    }
    .bf-toggle-btn.active {
      background: var(--barrier-500);
      border-color: var(--barrier-500);
      color: var(--white);
      box-shadow: 0 4px 12px rgba(245,158,11,0.4);
    }
    .bf-toggle-hint {
      font-size: 11px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: none; /* 모바일에서 공간 확보를 위해 숨김 */
    }
    @media (min-width: 1024px) {
      .bf-toggle-hint { display: block; }
    }

    /* ── 반값 여행 모바일 버튼 ── */
    .hp-mobile-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px;
      background: linear-gradient(135deg, #fef3c7, #fffbeb);
      border: 1.5px solid var(--hp-500);
      font-family: var(--font); font-size: 13px; font-weight: 700;
      color: #92400e; cursor: pointer; white-space: nowrap; flex-shrink: 0;
      text-decoration: none;
      box-shadow: 0 2px 6px rgba(245,158,11,0.2);
      transition: all 0.2s ease;
      min-height: 34px;
    }
    .hp-mobile-btn:hover {
      box-shadow: 0 4px 12px rgba(245,158,11,0.35);
      transform: translateY(-1px);
    }
    .hp-mobile-btn:active { transform: scale(0.96); }
    .bf-chip {
      display: flex; align-items: center; gap: 5px;
      background: var(--barrier-100); border-radius: 20px; padding: 5px 11px;
      font-size: 12px; font-weight: 500; color: var(--barrier-900);
      white-space: nowrap; cursor: pointer; flex-shrink: 0;
      border: 1px solid #fed7aa; transition: background 0.15s, transform 0.1s;
    }
    .bf-chip:active { background: #fde68a; transform: scale(0.97); }
    .acc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
    .acc-item {
      display: flex; align-items: center; gap: 7px; font-size: 12px;
      background: var(--gray-100); border-radius: 8px; padding: 7px 10px;
      color: var(--gray-900); box-shadow: var(--shadow-card);
    }
    .acc-item .acc-icon { font-size: 14px; flex-shrink: 0; }
    .acc-label { font-size: 11px; color: var(--gray-600); }
    .acc-note { font-size: 10px; color: var(--gray-400); line-height: 1.35; margin-top: 2px; }
    .bf-course-card {
      border: 1.5px solid #fed7aa; border-radius: 12px; padding: 12px 14px;
      margin-bottom: 8px; cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .bf-course-card:hover { background: var(--barrier-100); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
    .bf-course-title { font-size: 13px; font-weight: 700; color: var(--gray-900); margin-bottom: 3px; }
    .bf-course-desc  { font-size: 11px; color: var(--gray-400); line-height: 1.5; }
    .bf-place-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 10px; cursor: pointer; transition: background 0.15s;
    }
    .bf-place-item:hover { background: var(--gray-100); }
    .bf-place-item.active { background: var(--barrier-100); }
    .bf-pin-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--barrier-500); flex-shrink: 0; }
    .bf-place-name { font-size: 13px; font-weight: 600; color: var(--gray-900); flex: 1; }
    .bf-place-loc  { font-size: 11px; color: var(--gray-400); white-space: nowrap; }

    /* ── 반값 여행 배너 (사이드패널) ── */
    .hp-side-banner {
      display: block; text-decoration: none;
      background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
      border: 1.5px solid var(--hp-500); border-radius: 14px; padding: 12px 14px;
      margin-bottom: 14px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(245,158,11,0.15);
      transition: box-shadow 0.18s, transform 0.15s;
    }
    .hp-side-banner:hover { box-shadow: 0 4px 14px rgba(245,158,11,0.25); transform: translateY(-1px); }
    .hp-banner-title { font-size: 13px; font-weight: 700; color: #92400e; margin-bottom: 4px; }
    .hp-banner-desc  { font-size: 12px; color: #78350f; line-height: 1.5; margin-bottom: 2px; }
    .hp-banner-meta  { font-size: 11px; color: #a16207; line-height: 1.6; }
    .hp-banner-link  { display: inline-block; margin-top: 6px; font-size: 11px; font-weight: 700; color: #d97706; }

    /* ── 반값 여행 팝업 배지 (시트 내) ── */
    .hp-sheet-badge {
      display: flex; align-items: center; gap: 8px;
      background: linear-gradient(90deg, #fef3c7, #fffbeb);
      border: 1.5px solid var(--hp-500); border-radius: 10px;
      padding: 9px 12px; margin-bottom: 12px;
      font-size: 12px; font-weight: 700; color: #92400e;
    }

    /* ── 트렌드 스트립 (모바일) ── */
    .trend-strip {
      position: fixed; top: calc(var(--header-h) + var(--tab-h) + var(--bf-h)); left: 0; right: 0;
      height: var(--trend-h); background: var(--white); border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center; padding: 0 12px; gap: 8px;
      overflow-x: auto; overflow-y: hidden; scrollbar-width: none; z-index: 290;
      -webkit-overflow-scrolling: touch;
      transition: height 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .trend-strip::-webkit-scrollbar { display: none; }
    .trend-strip-header { display: none; }
    .trend-body { display: contents; }
    .trend-arrow { font-size: 10px; color: var(--gray-400); transition: transform 0.25s ease; flex-shrink: 0; }
    .trend-label { font-size: 11px; font-weight: 700; color: var(--gray-400); white-space: nowrap; flex-shrink: 0; }
    .trend-chip {
      display: flex; align-items: center; gap: 5px;
      background: var(--gray-100); border-radius: 20px; padding: 5px 11px;
      font-size: 12px; font-weight: 500; color: var(--gray-900);
      white-space: nowrap; cursor: pointer; flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    }
    .trend-chip:active { background: var(--gray-200); transform: scale(0.97); }
    .trend-chip.drama-chip { background: var(--hallyu-100); color: var(--hallyu-900); }
    .trend-chip.drama-chip:active { background: #ede9fe; }
    .trend-rank { font-size: 11px; font-weight: 700; min-width: 14px; text-align: center; }
    .trend-rank.rank-1 { color: #ef4444; }
    .trend-rank.rank-2 { color: #f97316; }
    .trend-rank.rank-3 { color: #eab308; }
    .trend-rank.rank-4, .trend-rank.rank-5 { color: var(--gray-400); }

    /* ── 모바일(≤768px) bf-toggle-row 2단 레이아웃 ── */
    @media (max-width: 768px) {
      :root { --bf-h: 88px; }
      .bf-toggle-row {
        height: var(--bf-h);
        flex-wrap: wrap;
        align-content: center;
        row-gap: 6px;
      }
      .lang-selector {
        flex-basis: 100%;
        justify-content: flex-end;
        margin-left: 0 !important;
        flex-shrink: 0;
      }
    }

    /* ── 모바일(≤768px) 트렌드 아코디언 ── */
    @media (max-width: 768px) {
      .trend-strip {
        flex-direction: column; align-items: stretch;
        overflow: hidden; padding: 0; gap: 0;
      }
      .trend-strip-header {
        display: flex; align-items: center; justify-content: space-between;
        height: 44px; padding: 0 12px;
        cursor: pointer; flex-shrink: 0; user-select: none;
      }
      .trend-strip.expanded .trend-arrow { transform: rotate(180deg); }
      .trend-body {
        display: flex; flex-direction: column;
        border-top: 1px solid var(--gray-100); overflow: hidden;
      }
      .trend-chip {
        border-radius: 0; background: var(--white);
        padding: 9px 12px 9px 16px; border-bottom: 1px solid var(--gray-100);
        flex-shrink: 0; font-size: 13px; gap: 10px;
      }
      .trend-chip:last-child { border-bottom: none; }
      .trend-chip.drama-chip { background: var(--white); color: var(--hallyu-900); }
      .trend-chip:active { background: var(--gray-100); transform: none; }
      .trend-body .bf-chip {
        width: 100%; justify-content: flex-start; border-radius: 8px;
        margin: 3px 8px 0; width: calc(100% - 16px);
      }
    }

    /* ── 지도 ── */
    #map {
      position: fixed;
      top: calc(var(--header-h) + var(--tab-h) + var(--bf-h) + var(--trend-h));
      left: 0; right: 0; bottom: 0;
      height: calc(100dvh - var(--header-h) - var(--tab-h) - var(--bf-h) - var(--trend-h));
    }

    /* ── 범례 ── */
    .legend {
      position: fixed;
      top: calc(var(--header-h) + var(--tab-h) + var(--bf-h) + var(--trend-h) + 12px);
      right: 12px;
      background: var(--white); border-radius: 12px; padding: 10px 12px;
      box-shadow: var(--shadow-card); z-index: 200;
      display: flex; flex-direction: column; gap: 6px;
      transition: opacity 0.2s;
    }
    .legend.hidden { opacity: 0; pointer-events: none; }
    .legend-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--gray-600); }
    .legend-dot { width: 14px; height: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .legend-dot svg { display: block; }

    /* ── 바텀시트 ── */
    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: var(--white); border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.10); z-index: 400;
      max-height: 80vh; display: flex; flex-direction: column;
      transform: translateY(calc(100% - 52px));
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle-area {
      padding: 10px 16px 12px; cursor: pointer; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .sheet-handle { width: 36px; height: 4px; background: var(--gray-200); border-radius: 2px; }
    .sheet-title-row { width: 100%; display: flex; align-items: center; gap: 8px; }
    .sheet-place { font-size: 17px; font-weight: 700; color: var(--gray-900); }
    .sheet-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
    .sheet-body { padding: 0 16px 32px; overflow-y: auto; flex: 1; }
    .sheet-desc { font-size: 14px; color: var(--gray-600); line-height: 1.65; margin-bottom: 12px; }
    .sheet-image { width: 100%; max-height: 180px; object-fit: cover; border-radius: 12px; margin-bottom: 12px; display: block; }
    .sheet-detail-loading { font-size: 12px; color: var(--gray-400); margin-bottom: 12px; }
    .sheet-overview { font-size: 14px; color: var(--gray-600); line-height: 1.65; margin-bottom: 6px;
      display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
    .sheet-overview.expanded { -webkit-line-clamp: unset; overflow: visible; }
    .sheet-more-btn { font-size: 12px; font-weight: 600; color: var(--primary-500); background: none; border: none; padding: 0 0 12px; cursor: pointer; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .tag { font-size: 12px; color: var(--primary-900); background: var(--primary-100); padding: 4px 10px; border-radius: 20px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .info-card { background: var(--gray-100); border-radius: 12px; padding: 10px 12px; box-shadow: var(--shadow-card); }
    .info-label { font-size: 11px; color: var(--gray-400); margin-bottom: 3px; }
    .info-val   { font-size: 14px; font-weight: 600; color: var(--gray-900); }
    .col-2 { grid-column: 1 / -1; }

    /* ── 다국어 그리드 ── */
    .i18n-section { margin-top: 14px; }
    .i18n-title { font-size: 12px; font-weight: 700; color: var(--gray-400); margin-bottom: 8px; }
    .i18n-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .i18n-item { background: var(--gray-100); border-radius: 8px; padding: 7px 10px; box-shadow: var(--shadow-card); }
    .i18n-lang { font-size: 10px; font-weight: 700; color: var(--gray-400); display: block; margin-bottom: 2px; }
    .i18n-text { font-size: 12px; font-weight: 500; color: var(--gray-900); line-height: 1.4; }

    /* ── 핀 ── */
    .pin-wrap {
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer; filter: drop-shadow(0 3px 4px rgba(0,0,0,0.35));
      transition: transform 0.15s ease; user-select: none;
      position: relative;
    }
    .pin-wrap:active { transform: scale(0.92); }
    .pin-wrap:focus-visible { outline: 3px solid #2563eb; outline-offset: 3px; border-radius: 50%; }
    .pin-wrap svg { display: block; }
    .pin-hp-badge {
      position: absolute; top: -5px; right: -6px;
      font-size: 11px; background: white; border-radius: 50%;
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.28);
    }
    .pin-festival-badge {
      position: absolute; top: -5px; left: -6px;
      font-size: 11px; background: white; border-radius: 50%;
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.28);
    }

    /* ── 사이드패널 공통 ── */
    .panel-section { margin-bottom: 20px; }
    .panel-section-title { font-size: 13px; font-weight: 700; color: var(--gray-600); margin-bottom: 10px; }
    .panel-list { display: flex; flex-direction: column; gap: 2px; }
    .panel-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 10px; cursor: pointer; transition: background 0.15s;
    }
    .panel-item:hover { background: var(--gray-100); }
    .panel-item:active { background: var(--gray-200); }
    .trend-chip:focus-visible, .bf-chip:focus-visible, .panel-item:focus-visible,
    .bf-course-card:focus-visible, .bf-place-item:focus-visible,
    .drama-card:focus-visible, .drama-site-item:focus-visible,
    .trend-strip-header:focus-visible, .sheet-handle-area:focus-visible {
      outline: 2px solid #2563eb; outline-offset: 2px;
    }
    .panel-rank { font-size: 13px; font-weight: 700; min-width: 18px; text-align: center; }
    .panel-rank.rank-1 { color: #ef4444; }
    .panel-rank.rank-2 { color: #f97316; }
    .panel-rank.rank-3 { color: #eab308; }
    .panel-rank.rank-4, .panel-rank.rank-5 { color: var(--gray-400); }
    .panel-item-text { font-size: 13px; font-weight: 500; color: var(--gray-900); flex: 1; line-height: 1.4; }
    .panel-item-sub  { font-size: 11px; color: var(--gray-400); white-space: nowrap; }
    .panel-divider { height: 1px; background: var(--gray-200); margin: 4px 0 18px; }
    .panel-place-card { border: 1px solid var(--gray-200); border-radius: 16px; padding: 16px; box-shadow: var(--shadow-card); }

    /* ── 드라마 카드 ── */
    .drama-card {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px; border-radius: 12px; cursor: pointer;
      border: 1.5px solid transparent;
      box-shadow: var(--shadow-card);
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.1s;

<script>
(function () {
  var SEASONS = ['spring', 'summer', 'autumn', 'winter'];
  var bg   = document.getElementById('heroBg');
  var tabs = document.querySelectorAll('.hero-stab');
  var cta  = document.getElementById('heroCtaBtn');
  var current = 0;
  var timer;

  function setSeason(season) {
    bg.className = 'hero-bg ' + season;
    document.getElementById('landing-hero').dataset.season = season;
    tabs.forEach(function(t) { t.classList.toggle('active', t.dataset.season === season); });
    current = SEASONS.indexOf(season);
  }

  function autoNext() {
    current = (current + 1) % SEASONS.length;
    setSeason(SEASONS[current]);
  }

  function startAuto() {
    clearInterval(timer);
    timer = setInterval(autoNext, 5000);
  }

  setSeason('spring');
  startAuto();

  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      setSeason(tab.dataset.season);
      startAuto();
    });
  });

  cta.addEventListener('click', function() {
    var hero = document.getElementById('landing-hero');
    var app  = document.getElementById('app-wrapper');
    if (app) app.style.display = 'block';
    hero.classList.add('fade-out');
    setTimeout(function() { hero.style.display = 'none'; }, 600);
    setTimeout(function() {
      if (window.kakaoMap) {
        window.kakaoMap.relayout();
        window.kakaoMap.setCenter(new kakao.maps.LatLng(36.5, 127.5));
        window.kakaoMap.setLevel(13);
      }
    }, 300);
  });
})();
</script>

// ── API 공통 fetch (언어별 다국어 서비스 자동 선택 + KO fallback) ──
async function ktoFetch(endpoint, params = {}) {
  const makeQs = () => new URLSearchParams({
    numOfRows: 20, pageNo: 1,
    MobileOS: 'ETC', MobileApp: 'SeasonRoad', _type: 'json',
    ...params,
  });
  const parseItems = async (res) => {
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data  = await res.json();
    const items = data?.response?.body?.items?.item;
    if (!items) return [];
    return Array.isArray(items) ? items : [items];
  };
  const baseUrl = KTO_BASE_URLS[currentLang] || KTO_BASE_URLS.ko;
  try {
    return await parseItems(await fetch(`${baseUrl}/${endpoint}?${makeQs()}`));
  } catch (e) {
    if (currentLang !== 'ko') {
      console.warn(`[SeasonRoad] 다국어 API(${currentLang}) 실패 → 한국어 fallback:`, e);
      return await parseItems(await fetch(`${KTO_BASE_URLS.ko}/${endpoint}?${makeQs()}`));
    }
    throw e;
  }
}

// ── 상세조회 (detailCommon2, contentId 기준 캐시) ──
// v2는 v1의 defaultYN/overviewYN/firstImageYN 등 플래그 파라미터를 모두 거부(INVALID_REQUEST_PARAMETER_ERROR)하고
// contentId만 넘기면 overview/firstimage/homepage/tel을 기본으로 전부 내려준다 (실측 확인됨).
async function loadPlaceDetail(contentId) {
  const cacheKey = `${currentLang}_${contentId}`;
  if (cacheKey in _detailCache) return _detailCache[cacheKey];
  const qs = new URLSearchParams({
    contentId,
    MobileOS: 'ETC', MobileApp: 'SeasonRoad', _type: 'json',
  });
  const baseUrl = KTO_BASE_URLS[currentLang] || KTO_BASE_URLS.ko;
  try {
    const res = await fetch(`${baseUrl}/detailCommon2?${qs}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data  = await res.json();
    const items = data?.response?.body?.items?.item;
    const item  = Array.isArray(items) ? items[0] : items;
    _detailCache[cacheKey] = item || null;
  } catch (e) {
    console.warn(`[SeasonRoad] 상세조회(detailCommon2) 실패 contentId=${contentId}:`, e);
    _detailCache[cacheKey] = null;
  }
  return _detailCache[cacheKey];
}

// ── 무장애 API 공통 fetch (KorWithService2 전용, 다국어 버전 없음 — 항상 한국어) ──
async function bfFetch(endpoint, params = {}) {
  const qs = new URLSearchParams({
    numOfRows: 20, pageNo: 1,
    MobileOS: 'ETC', MobileApp: 'SeasonRoad', _type: 'json',
    ...params,
  });
  const res = await fetch(`${KTO_BF_BASE_URL}/${endpoint}?${qs}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data  = await res.json();
  const items = data?.response?.body?.items?.item;
  if (!items) return [];
  return Array.isArray(items) ? items : [items];
}

// ── 무장애 접근성 상세조회 (detailWithTour2, contentId 기준 캐시) ──
// 실측 확인: contentTypeId를 넘기면 INVALID_REQUEST_PARAMETER_ERROR(contentTypeId) 발생 — contentId만 전달.
const _bfDetailCache = {}; // key: contentId → detailWithTour2 응답 item (없으면 null)
async function loadBFDetail(contentId) {
  if (contentId in _bfDetailCache) return _bfDetailCache[contentId];
  try {
    const items = await bfFetch('detailWithTour2', { contentId });
    _bfDetailCache[contentId] = items[0] || null;
  } catch (e) {
    console.warn(`[SeasonRoad] 무장애 상세조회(detailWithTour2) 실패 contentId=${contentId}:`, e);
    _bfDetailCache[contentId] = null;
  }
  return _bfDetailCache[contentId];

// detailWithTour2 응답 필드 → 기존 accessibility 구조로 변환
// 실측: 값은 boolean이 아니라 설명 텍스트(예: "대여가능", "장애인 전용 화장실 있음(1층)")이며, 빈 문자열이면 정보 없음.
// 기존 렌더링(값이 truthy면 ✅)과 호환되도록 빈 문자열/텍스트 그대로 유지.
function _bfDetailToAccessibility(detail) {
  if (!detail) return null;
  return {
    wheelchair:    detail.wheelchair || '',
    toilet:        detail.restroom || '',
    ramp:          detail.exit || '',
    braille:       detail.braileblock || detail.brailepromotion || '',
    parking:       detail.parking || '',
    stroller:      detail.stroller || '',
    lactationroom: detail.lactationroom || '',
  };
}

// accessibility 객체(boolean 또는 텍스트 값 혼용) → acc-grid HTML
function _renderAccGrid(accessibility) {
  const labels = ACC_LABELS[currentLang] || ACC_LABELS.ko;
  return Object.entries(accessibility).map(([key, val]) => {
    const has  = typeof val === 'string' ? val.length > 0 : !!val;
    const note = typeof val === 'string' && val ? `<div class="acc-note">${val}</div>` : '';
    return `<div class="acc-item">
      <span class="acc-icon">${has ? '✅' : '❌'}</span>
      <div><span class="acc-label">${labels[key] || key}</span>${note}</div>
    </div>`;
  }).join('');
}

// 관광공사 서비스분류코드(cat2) → 한글 이름. 실측 응답에 자주 나오는 코드 위주로만 등재.
// 매핑에 없는 코드는 해시태그를 표시하지 않는다(코드 그대로 노출 금지).
// ko만 지원(분량상 EN/ZH/JA는 미번역) — 해당 언어 모드에서는 이 해시태그 자체를 숨김.
const KTO_CATEGORY_LABELS = {
  A0101:'자연관광지', A0102:'관광자원',
  A0201:'역사관광지', A0202:'휴양관광지', A0203:'체험관광지', A0204:'산업관광지',
  A0205:'건축/조형물', A0206:'문화시설', A0207:'축제', A0208:'공연/행사',
  A0301:'레포츠', A0302:'육상레포츠', A0303:'수상레포츠', A0304:'항공레포츠', A0305:'복합레포츠',
  A0401:'쇼핑', A0502:'음식점',
};

// ── 변환 함수 ──
function _ktoToPlace(item, season, isFestival = false) {
  const t = _TC[Math.abs(parseInt(item.contentid, 10) || 0) % 3];
  const catLabel = KTO_CATEGORY_LABELS[item.cat2];
  return {
    id: item.contentid, name: item.title,
    lat: parseFloat(item.mapy), lng: parseFloat(item.mapx),
    type: t, label: _TL[t], color: _TK[t],
    seasons: [season], desc: item.addr1 || '',
    tags: (currentLang === 'ko' && catLabel) ? [`#${catLabel}`] : [],
    duration: _TD[t], location: item.addr1 || '',
    i18n: { ko: item.title, en: item.title, zh: item.title, ja: item.title },
    apiId: item.contentid, image: item.firstimage || '',
    _fromApi: true, // detailCommon2 상세조회 대상 여부 (더미 PLACES와 구분용, apiId는 더미도 갖고 있어 구분 불가)
    isFestival, // searchFestival2 출처 여부 (지도 핀 뱃지 구분용)
  };
}

function _ktoToBF(item) {
  return {
    id: 'bf_' + item.contentid, name: item.title,
    lat: parseFloat(item.mapy), lng: parseFloat(item.mapx),
    type: 'day', label: '당일 코스', duration: '당일',
    location: item.addr1 || '', desc: item.addr1 || '',
    tags: ['#무장애', '#접근가능'],
    accessibility: null, // lazy: openBFPlace 클릭 시 detailWithTour2로 로드
    i18n: { ko: item.title, en: item.title, zh: item.title, ja: item.title },
    apiId: item.contentid, image: item.firstimage || '', _fromApi: true,
  };
}

// ── 계절 관광지 로드 (areaBasedList2 + searchFestival2) ──
async function loadSeasonData(season) {
  if (_seasonCache[season]) return _seasonCache[season];
  const SEASON_START = {
    spring:'20260301', summer:'20260601', autumn:'20260901', winter:'20261201',
  };
  const SEASON_END = {
    spring:'20260531', summer:'20260831', autumn:'20261130', winter:'20270228',
  };
  const areaCodes = SEASON_AREA_CODES[season] || [1];
  const spotType = (KTO_CONTENT_TYPES[currentLang] || KTO_CONTENT_TYPES.ko).spot;
  const [spotResults, festivalItems] = await Promise.all([
    Promise.all(areaCodes.map(ac => ktoFetch('areaBasedList2', { areaCode: ac, contentTypeId: spotType }))),
    ktoFetch('searchFestival2', { eventStartDate: SEASON_START[season], eventEndDate: SEASON_END[season], numOfRows: 10 }),
  ]);
  const valid = i => i.mapx && i.mapy && parseFloat(i.mapx) !== 0 && parseFloat(i.mapy) !== 0;
  const spots     = spotResults.flat().filter(valid).map(i => _ktoToPlace(i, season));
  const festivals = festivalItems.filter(valid).map(i => _ktoToPlace(i, season, true));
  const all = [...spots, ...festivals];
  _seasonCache[season] = all.length ? all : null;
  return _seasonCache[season];
}

// 계절에 맞는 BARRIER_FREE_DATA 더미만 추림 (seasons 없는 항목은 계절 무관 상시 노출)
function _bfDummyForSeason(season) {
  return BARRIER_FREE_DATA.filter(p => !p.seasons || p.seasons.includes(season));
}

// ── 무장애 관광지 로드 (KorWithService2: searchKeyword2("무장애") 전용코스 + 계절별 areaBasedList2 병합) ──
// 실측: searchKeyword2("무장애")는 전국 4건("무장애숲길/나눔길" 등 전용 코스)뿐이라 지역별 일반 관광지로 보강.
// (실측: 표본 관광지들의 detailWithTour2 응답 대부분에 접근성 정보가 채워져 있음을 확인)
// 전용 코스 4건은 계절 무관 상시 포함하고, 보강용 일반 관광지는 SEASON_AREA_CODES[season]로 계절마다 다르게 조회
// (실측 확인: KorWithService2 areaBasedList2가 SEASON_AREA_CODES 값 전체에 정상 응답함).
// 결과가 없거나 실패 시 BARRIER_FREE_DATA 더미로 fallback (기존 패턴 동일, seasons 필드로 계절 필터).
async function loadBFData(season) {
  if (_bfCache[season] !== undefined) return _bfCache[season]; // sentinel 포함, undefined만 재시도
  const areaCodes = SEASON_AREA_CODES[season] || [1];
  try {
    const [keywordItems, areaResults] = await Promise.all([
      _bfKeywordCache === null ? bfFetch('searchKeyword2', { keyword: '무장애', numOfRows: 20 }) : Promise.resolve(_bfKeywordCache),
      Promise.all(areaCodes.map(ac => bfFetch('areaBasedList2', { areaCode: ac, contentTypeId: 12, numOfRows: 6 }))),
    ]);
    _bfKeywordCache = keywordItems;
    const valid = i => i.mapx && i.mapy && parseFloat(i.mapx) !== 0 && parseFloat(i.mapy) !== 0;
    const seen  = new Set();
    const merged = [...keywordItems, ...areaResults.flat()].filter(i => {
      if (!valid(i) || seen.has(i.contentid)) return false;
      seen.add(i.contentid);
      return true;
    });
    const places = merged.map(_ktoToBF).slice(0, 16);
    if (places.length) {
      _bfCache[season] = places;
      console.info(`[SeasonRoad] 무장애 API(KorWithService2) ${season} ${places.length}개 로드 완료`);
    } else {
      console.warn('[SeasonRoad] 무장애 API 결과 없음 → BARRIER_FREE_DATA 더미로 fallback');
      _bfCache[season] = _bfDummyForSeason(season);
    }
  } catch(e) {
    console.warn('[SeasonRoad] 무장애 API 호출 실패, BARRIER_FREE_DATA 더미로 fallback:', e);
    _bfCache[season] = _bfDummyForSeason(season);
  }
  return _bfCache[season];
}

// ── 계절별 무장애 장소 조회 (캐시 우선, 없으면 계절 필터된 더미) ──
function bfPlacesForSeason(season) {
  return _bfCache[season] || _bfDummyForSeason(season);
}

// ── 한류 관광지 로드 ──
// 실측 결과 TourAPI 4개 언어 서비스(Kor/Eng/Chs/Jpn) 어디에도 "한류/드라마 촬영지" 전용
// contentTypeId가 존재하지 않음 (국문 85는 데이터 0건, 외국어 85는 "축제공연행사"로 이미 사용 중이라
// 그대로 쓰면 축제 데이터가 한류 촬영지로 잘못 표시됨). 따라서 실API 호출 없이 DRAMA_DATA로 렌더링한다.
async function loadHallyuData() {
  if (_hallyuCache !== null) return _hallyuCache; // [] sentinel 포함, null만 재시도
  console.info('[SeasonRoad] 한류 카테고리는 TourAPI에 대응 콘텐츠타입이 없어 DRAMA_DATA로 렌더링');
  _hallyuCache = DRAMA_DATA.flatMap(drama =>
    (drama.sites || []).map(site => ({
      id: `dummy_${drama.id}_${site.name}`,
      name: site.name,
      lat: site.lat, lng: site.lng,
      type: 'hallyu', label: '한류 촬영지', color: drama.pinColor || '#a855f7',
      seasons: ['spring','summer','autumn','winter'],
      desc: `${drama.title} 촬영지`,
      descI18n: { ko: `${drama.title} 촬영지`, en: '', zh: '', ja: '' },
      tags: ['#한류관광', `#${drama.title}`],
      duration: '반나절', location: site.name,
      i18n: { ko: site.name, en: site.name, zh: site.name, ja: site.name },
    }))
  );
  return _hallyuCache;
}

// ── 지도 핀 SVG (물방울 모양, 색상만 다름) ──
function darkenColor(hex, amt = 32) {
  const clean = hex.replace('#', '');
  const num = parseInt(clean.length === 3 ? clean.split('').map(c => c + c).join('') : clean, 16);
  const r = Math.max(0, (num >> 16) - amt);
  const g = Math.max(0, ((num >> 8) & 0xff) - amt);
  const b = Math.max(0, (num & 0xff) - amt);
  return '#' + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
}

function pinMarkerSVG(color, w = 32, h = 40) {
  const stroke = darkenColor(color);
  return `<svg width="${w}" height="${h}" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
    <path d="M16 1C8.268 1 2 7.268 2 15c0 10.5 14 23.5 14 23.5S30 25.5 30 15C30 7.268 23.732 1 16 1Z"
          fill="${color}" stroke="${stroke}" stroke-width="1"/>
    <ellipse cx="11.5" cy="10.5" rx="4.6" ry="3.2" fill="#fff" opacity=".55" transform="rotate(-25 11.5 10.5)"/>
  </svg>`;
}

  el.textContent = '';

}

function setSheetOpen(open) {
  document.getElementById('sheet').classList.toggle('open', open);
  const handle = document.getElementById('sheetHandle');
  if (handle) {
    handle.setAttribute('aria-expanded', String(open));
    handle.setAttribute('aria-label', open ? '여행지 상세 정보 접기' : '여행지 상세 정보 펼치기');

}

// ── 키보드 접근성: 클릭형 요소에 Enter/Space 키 활성화 부여 ──
function bindActivatable(el, handler) {
  el.addEventListener('click', handler);
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
      e.preventDefault();
      handler(e);
    }
  });
}

kakao.maps.load(function () {

  });
  window.kakaoMap = map;
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);

  // ── 상태 ──
  let currentSeason  = 'spring';
  let hallyuMode     = false;
  let bfMode         = false;
  let activeDramaId  = null;
  let activeSiteId   = null;
  let activeBFId     = null;
  let _pinClicked    = false;
  let _searchTimer   = null;
  let _sheetEmpty    = true;
  let _lastOpened    = null; // { kind:'place'|'bf'|'drama', data, drama? }

  // ── 지도 이동 ──
  function flyTo(lat, lng, level = 5) {
    map.setLevel(level);
    map.panTo(new kakao.maps.LatLng(lat, lng));
  }
  function fitBounds(sites) {
    if (!sites.length) return;
    if (sites.length === 1) { flyTo(sites[0].lat, sites[0].lng, 5); return; }
    const bounds = new kakao.maps.LatLngBounds();
    sites.forEach(s => bounds.extend(new kakao.maps.LatLng(s.lat, s.lng)));
    map.setBounds(bounds, 70);
  }

  // ── 핀 DOM 생성 ──
  let overlays = [];
  function clearOverlays() { overlays.forEach(o => o.setMap(null)); overlays = []; }

  function addOverlay(lat, lng, el) {
    const o = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(lat, lng),
      content: el, yAnchor: 1.0, zIndex: 3,
    });
    o.setMap(map);
    overlays.push(o);
  }

  function makePinEl(color, onClick, halfPrice = false, isFestival = false, label = '') {
    const wrap = document.createElement('div'); wrap.className = 'pin-wrap';
    wrap.innerHTML = pinMarkerSVG(halfPrice ? '#eab308' : color);
    if (halfPrice) {
      const badge = document.createElement('div'); badge.className = 'pin-hp-badge';
      badge.textContent = '💰';
      wrap.appendChild(badge);
    }
    if (isFestival) {
      const badge = document.createElement('div'); badge.className = 'pin-festival-badge';
      badge.textContent = '🎉';
      wrap.appendChild(badge);
    }
    wrap.tabIndex = 0;
    wrap.setAttribute('role', 'button');
    if (label) wrap.setAttribute('aria-label', label);
    const activate = (e) => {
      e.stopPropagation(); _pinClicked = true;
      onClick();
      setTimeout(() => { _pinClicked = false; }, 0);
    };
    wrap.addEventListener('click', activate);
    wrap.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        activate(e);
      }
    });
    return wrap;
  }

  // ── 핀 추가 ──

  // ── 트렌드 스트립 접기/펼치기 (모바일 전용) ──
  function collapseTrendStrip() {

    if (!strip) return;

    if (header) { header.setAttribute('aria-expanded', 'false'); header.setAttribute('aria-label', '트렌드 목록 펼치기'); }

    setTimeout(() => { map.relayout(); }, 300);

  // ── 트렌드 TOP5 후보 선정 (축제 우선 → 부족하면 일반 관광지로 채움) ──
  function pickTrendCandidates(season) {
    const apiPlaces = _seasonCache[season];
    if (!apiPlaces || !apiPlaces.length) return null;
    const festivals = apiPlaces.filter(p => p.isFestival);
    const spots     = apiPlaces.filter(p => !p.isFestival);
    const candidates = [...festivals, ...spots].slice(0, 5);
    return candidates.length ? candidates : null;
  }

  // ── 데이터랩 검색어는 항상 한국어로 보낸다: currentLang이 한국어가 아니면
  //    KTO 한국어 서비스(detailCommon2)로 원어명을 별도 조회한다 ──
  async function getKoreanName(place) {
    if (currentLang === 'ko') return place.name;
    if (place.id in _koNameCache) return _koNameCache[place.id];
    try {
      const qs = new URLSearchParams({
        contentId: place.id, MobileOS: 'ETC', MobileApp: 'SeasonRoad', _type: 'json',
      });
      const res = await fetch(`${KTO_BASE_URLS.ko}/detailCommon2?${qs}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data  = await res.json();
      const items = data?.response?.body?.items?.item;
      const item  = Array.isArray(items) ? items[0] : items;
      _koNameCache[place.id] = item?.title || place.name;
    } catch (e) {
      console.warn(`[SeasonRoad] 한국어 장소명 조회 실패(contentId=${place.id}), 표시명으로 대체:`, e);
      _koNameCache[place.id] = place.name;
    }
    return _koNameCache[place.id];
  }

  // ── 네이버 데이터랩 검색어트렌드로 후보 5개 실제 검색량 순위 매기기 ──
  // 실패 시(네트워크 오류, 응답 이상 등) null이 아닌 후보 원순서(축제 우선)를 그대로 반환해 조용히 대체한다.
  async function loadSeasonTrend(season) {
    const candidates = pickTrendCandidates(season);
    if (!candidates) return null;
    try {
      const koNames = await Promise.all(candidates.map(p => getKoreanName(p)));
      const keywordGroups = candidates.map((p, i) => ({ groupName: String(p.id), keywords: [koNames[i]] }));
      const res = await fetch(`${API_PROXY_BASE}/naver/datalab`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ season, keywordGroups }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data    = await res.json();
      const results = data?.results;
      if (!Array.isArray(results) || !results.length) throw new Error('빈 응답');
      const scoreById = {};
      results.forEach(r => {
        const last = r.data && r.data[r.data.length - 1];
        scoreById[r.title] = last ? last.ratio : 0; // title === groupName === contentId
      });
      return [...candidates].sort((a, b) => (scoreById[String(b.id)] ?? 0) - (scoreById[String(a.id)] ?? 0));
    } catch (e) {
      console.warn(`[SeasonRoad] 데이터랩 트렌드 조회 실패 → 축제 우선 순서로 대체:`, e);
      return candidates;
    }
  }

  // ── 트렌드 순위 백그라운드 갱신 (계절당 세션 내 1회) ──
  async function refreshSeasonTrend(season) {
    if (!USE_REAL_API || _trendCache[season]) return;
    const ranked = await loadSeasonTrend(season);
    if (!ranked) return; // 관광지 API 자체가 비어있음 → TREND_DATA 정적 fallback 유지
    _trendCache[season] = ranked;
    if (currentSeason === season && !hallyuMode && !bfMode) {
      renderSeasonStrip(season);
      renderSeasonPanel(null);
    }
  }

  // ── 모바일 스트립 ──
  function renderSeasonStrip(season) {
    const body  = document.getElementById('trendBody');
    const label = document.getElementById('trendLabel');
    if (!body) return;
    if (label) label.textContent = L().trendStripLabel;
    body.innerHTML = '';
    collapseTrendStrip();
    const trendPlaces = _trendCache[season] || pickTrendCandidates(season);
    if (trendPlaces && trendPlaces.length) {
      trendPlaces.slice(0, 5).forEach((place, i) => {
        const chip = document.createElement('div'); chip.className = 'trend-chip';
        chip.innerHTML = `<span class="trend-rank rank-${i+1}">${i+1}</span>${place.name}`;
        chip.tabIndex = 0; chip.setAttribute('role', 'button');
        chip.setAttribute('aria-label', `${i+1}위, ${place.name}`);
        bindActivatable(chip, () => { flyTo(place.lat, place.lng); openPlace(place); });
        body.appendChild(chip);
      });
    } else {
      (TREND_DATA[season] || []).forEach((item, i) => {
        const chip = document.createElement('div'); chip.className = 'trend-chip';
        const kw = item.keyword[currentLang] || item.keyword.ko;
        chip.innerHTML = `<span class="trend-rank rank-${i+1}">${i+1}</span>${kw}`;
        chip.tabIndex = 0; chip.setAttribute('role', 'button');
        chip.setAttribute('aria-label', `${i+1}위, ${kw}`);
        bindActivatable(chip, () => {
          const place = PLACES.find(p => p.id === item.placeId);
          if (place) { flyTo(place.lat, place.lng); openPlace(place); }
        });
        body.appendChild(chip);
      });
    }
  }

  // ── 무장애 장소 상세 ──
  function openBFPlace(place) {
    _sheetEmpty = false;
    _lastOpened = { kind: 'bf', data: place };
    activeBFId = place.id;
    const lang = L();
    const name = place.i18n ? (place.i18n[currentLang] || place.name) : place.name;
    document.getElementById('sheetPlace').textContent = name;
    announce(`${name} 정보를 표시합니다`);
    const badge = document.getElementById('sheetBadge');
    const courseLabel = lang.courseTypeLabel[place.type] || place.label;
    const durLabel    = lang.durationLabel[place.type]   || place.duration;
    const locLabel    = LOCATION_I18N[place.location]?.[currentLang] || place.location;
    badge.textContent = courseLabel;
    badge.style.background = '#fffbeb';
    badge.style.color = '#92400e';

    // API 로드 장소만 detailCommon2(이미지·개요) 상세조회 대상 (더미 데이터는 apiId가 실제 콘텐츠ID가 아니므로 제외)
    const detailSlot = place._fromApi
      ? `${_sheetImageHtml(place.image, name)}<div class="sheet-detail-loading" id="sheetDetailLoading">${lang.detailLoading}</div>`
      : _sheetImageHtml(place.image, name);

    // accessibility가 null이면(API 장소, 아직 미로드) 로딩 표시 후 detailWithTour2로 lazy 로드
    const accHtml = place.accessibility
      ? _renderAccGrid(place.accessibility)
      : `<div class="sheet-detail-loading" id="bfAccLoading">${lang.detailLoading}</div>`;

    document.getElementById('sheetBody').innerHTML = `
      <div id="sheetDetailSlot">${detailSlot}</div>
      <p class="sheet-desc" id="sheetDescText">${place.descI18n?.[currentLang] || place.desc}</p>
      <div class="tag-row">${(place.tagsI18n?.[currentLang] || place.tags).map(t=>`<span class="tag" style="background:#fffbeb;color:#92400e">${t}</span>`).join('')}</div>
      <div class="info-grid">
        <div class="info-card"><div class="info-label">${lang.fieldCourseType}</div><div class="info-val">${courseLabel}</div></div>
        <div class="info-card"><div class="info-label">${lang.fieldDuration}</div><div class="info-val">${durLabel}</div></div>
        <div class="info-card col-2"><div class="info-label">${lang.fieldLocation}</div><div class="info-val">${locLabel}</div></div>
      </div>
      <div class="i18n-section">
        <div class="i18n-title">${lang.accessibility}</div>
        <div class="acc-grid" id="bfAccGrid">${accHtml}</div>
      </div>`;
    setSheetOpen(true);
    if (bfMode && !hallyuMode) renderBFPanel();

    if (place._fromApi && place.apiId) {
      // 이미지·개요 (detailCommon2, openPlace와 동일 패턴)
      loadPlaceDetail(place.apiId).then(detail => {
        if (_lastOpened.kind !== 'bf' || _lastOpened.data !== place) return; // stale 응답 방지
        const slot = document.getElementById('sheetDetailSlot');
        if (!slot) return;
        const imgUrl   = place.image || detail?.firstimage || '';
        const overview = detail?.overview || '';
        if (!imgUrl && !overview) { slot.innerHTML = ''; return; }
        slot.innerHTML = `
          ${_sheetImageHtml(imgUrl, name)}
          ${overview ? `<p class="sheet-overview" id="sheetOverviewText">${overview}</p>
          <button class="sheet-more-btn" id="sheetMoreBtn">${lang.readMore}</button>` : ''}`;
        const moreBtn = document.getElementById('sheetMoreBtn');
        if (moreBtn) {
          moreBtn.addEventListener('click', () => {
            const p = document.getElementById('sheetOverviewText');
            const expanded = p.classList.toggle('expanded');
            moreBtn.textContent = expanded ? lang.readLess : lang.readMore;
          });
        }
        // 개요가 성공적으로 로드되면 주소 텍스트(desc)는 위치 카드와 중복이므로 제거
        if (overview) {
          const descEl = document.getElementById('sheetDescText');
          if (descEl) descEl.remove();
        }
      });

      // 접근성 상세 (detailWithTour2, lazy — 목록 전체가 아닌 클릭한 장소만 호출)
      loadBFDetail(place.apiId).then(detail => {
        if (_lastOpened.kind !== 'bf' || _lastOpened.data !== place) return; // stale 응답 방지
        const grid = document.getElementById('bfAccGrid');
        if (!grid) return;
        const acc = _bfDetailToAccessibility(detail);
        place.accessibility = acc; // 재방문 시 재사용
        grid.innerHTML = acc ? _renderAccGrid(acc) : `<div class="sheet-detail-loading">${lang.bfNoAccData}</div>`;
      });
    }
  }

    const panel  = document.getElementById('panelContent');
    const lang   = L();
    const dramas = activeDramaId ? DRAMA_DATA.filter(d => d.id === activeDramaId) : DRAMA_DATA;

      ? `<button class="drama-reset-btn" id="dramaResetBtn">${lang.allDramas}</button>` : '';

          <div class="drama-card-meta">

          const siteName   = s.i18n ? (s.i18n[currentLang] || s.name) : s.name;
          const isActiveSite = s.id === activeSiteId;
          return `<div class="drama-site-item ${isActiveSite?'active':''}" data-site-id="${s.id}" data-drama-id="${drama.id}" tabindex="0" role="button" aria-label="${siteName}, ${drama.title} 촬영지">
            <div>
              <div class="drama-site-name">${siteName}</div>
              <div class="drama-site-scene">${s.scene}</div>
            </div>

        }).join('');

            <div id="siteList">${items}</div>

    panel.innerHTML = `
      <div class="panel-section">
        <h2 class="panel-section-title">${title}</h2>
        ${resetBtn}
        <div id="dramaCardList">${dramaCards}</div>
      </div>

    panel.querySelectorAll('#dramaCardList .drama-card').forEach(el => {
      bindActivatable(el, () => {
        const id    = el.dataset.dramaId;

        if (!drama) return;
        if (activeDramaId === id) {
          activeDramaId = null; activeSiteId = null;
          renderDramaPins(DRAMA_DATA); renderDramaPanel(searchLabel);
          map.setLevel(7); map.setCenter(new kakao.maps.LatLng(36.5, 127.8));
        } else {
          activeDramaId = id; activeSiteId = null;
          renderDramaPins([drama]); fitBounds(drama.sites);
          renderDramaPanel(searchLabel);
        }
      });

    const resetBtn2 = panel.querySelector('#dramaResetBtn');
    if (resetBtn2) {
      resetBtn2.addEventListener('click', () => {
        activeDramaId = null; activeSiteId = null;
        const filtered = searchLabel
          ? DRAMA_DATA.filter(d => d.title.includes(searchLabel) || d.titleEn.toLowerCase().includes(searchLabel.toLowerCase()))
          : DRAMA_DATA;
        renderDramaPins(filtered);
        renderDramaPanel(searchLabel);
        map.setLevel(7); map.setCenter(new kakao.maps.LatLng(36.5, 127.8));
      });

    panel.querySelectorAll('#siteList .drama-site-item').forEach(el => {
      bindActivatable(el, () => {
        const siteId  = el.dataset.siteId;
        const dramaId = el.dataset.dramaId;
        const drama   = DRAMA_DATA.find(d => d.id === dramaId);
        const site    = drama && drama.sites.find(s => s.id === siteId);
        if (site && drama) { flyTo(site.lat, site.lng); openDramaSite(site, drama); }
      });
    });
  }

  // ── 장소 상세 (계절) ──
  function _sheetImageHtml(url, name) {
    return url ? `<img class="sheet-image" src="${url}" alt="${name || ''}" loading="lazy" />` : '';
  }

  function openPlace(place) {
    _sheetEmpty = false;
    _lastOpened = { kind: 'place', data: place };
    const lang = L();
    const bs   = BADGE_STYLE[place.type] || {};
    const name = place.i18n ? (place.i18n[currentLang] || place.name) : place.name;
    document.getElementById('sheetPlace').textContent = name;
    announce(`${name} 정보를 표시합니다`);
    const badge = document.getElementById('sheetBadge');
    const courseLabel = lang.courseTypeLabel[place.type] || place.label;
    const durLabel    = lang.durationLabel[place.type]   || place.duration;
    const locLabel    = LOCATION_I18N[place.location]?.[currentLang] || place.location;
    badge.textContent = courseLabel;
    badge.style.background = bs.bg || '#f3f4f6';
    badge.style.color      = bs.color || '#374151';

    const hpBadge = isHalfPriceRegion(place.location)
      ? `<div class="hp-sheet-badge">${lang.halfPrice.badge}</div>` : '';
    const festivalBadge = place.isFestival
      ? `<div class="hp-sheet-badge" style="background:linear-gradient(90deg,#f3e8ff,#faf5ff);border-color:var(--hallyu-500);color:var(--hallyu-900)">${lang.festivalBadge}</div>` : '';

    // API 로드 장소만 detailCommon2 상세조회 대상 (더미 PLACES의 apiId는 실제 콘텐츠ID가 아니므로 제외)
    const detailSlot = place._fromApi
      ? `${_sheetImageHtml(place.image, name)}<div class="sheet-detail-loading" id="sheetDetailLoading">${lang.detailLoading}</div>`
      : _sheetImageHtml(place.image, name);

    document.getElementById('sheetBody').innerHTML = `
      <div id="sheetDetailSlot">${detailSlot}</div>
      ${hpBadge}
      ${festivalBadge}
      <p class="sheet-desc" id="sheetDescText">${place.descI18n?.[currentLang] || place.desc}</p>
      <div class="tag-row">${(place.tagsI18n?.[currentLang] || place.tags).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="info-grid">
        <div class="info-card"><div class="info-label">${lang.fieldCourseType}</div><div class="info-val">${courseLabel}</div></div>
        <div class="info-card"><div class="info-label">${lang.fieldDuration}</div><div class="info-val">${durLabel}</div></div>
        <div class="info-card col-2"><div class="info-label">${lang.fieldLocation}</div><div class="info-val">${locLabel}</div></div>
      </div>`;
    setSheetOpen(true);
    renderSeasonPanel(place);

    if (place._fromApi && place.apiId) {
      loadPlaceDetail(place.apiId).then(detail => {
        // 상세조회가 오는 동안 사용자가 다른 장소를 열었으면 반영하지 않음
        if (_lastOpened.kind !== 'place' || _lastOpened.data !== place) return;
        const slot = document.getElementById('sheetDetailSlot');
        if (!slot) return;
        const imgUrl   = place.image || detail?.firstimage || '';
        const overview = detail?.overview || '';
        if (!imgUrl && !overview) { slot.innerHTML = ''; return; }
        slot.innerHTML = `
          ${_sheetImageHtml(imgUrl, name)}
          ${overview ? `<p class="sheet-overview" id="sheetOverviewText">${overview}</p>
          <button class="sheet-more-btn" id="sheetMoreBtn">${lang.readMore}</button>` : ''}`;
        const moreBtn = document.getElementById('sheetMoreBtn');
        if (moreBtn) {
          moreBtn.addEventListener('click', () => {
            const p = document.getElementById('sheetOverviewText');
            const expanded = p.classList.toggle('expanded');
            moreBtn.textContent = expanded ? lang.readLess : lang.readMore;
          });
        }
        // 개요가 성공적으로 로드되면 주소 텍스트(desc)는 위치 카드와 중복이므로 제거
        if (overview) {
          const descEl = document.getElementById('sheetDescText');
          if (descEl) descEl.remove();
        }
      });
    }
  }

  // ── 촬영지 상세 (드라마) ──
  function openDramaSite(site, drama) {
    _sheetEmpty = false;
    _lastOpened = { kind: 'drama', data: site, drama };
    activeSiteId = site.id;
    const siteName = site.i18n ? (site.i18n[currentLang] || site.name) : site.name;
    document.getElementById('sheetPlace').textContent = siteName;
    announce(`${siteName} 정보를 표시합니다`);
    const badge = document.getElementById('sheetBadge');
    badge.textContent = drama.title;
    badge.style.background = '#faf5ff';
    badge.style.color = '#6b21a8';
    const lang = L();
    document.getElementById('sheetBody').innerHTML = `
      <p class="sheet-desc">${site.scene}</p>
      <div class="info-grid">
        <div class="info-card"><div class="info-label">${lang.fieldLocation}</div><div class="info-val">${site.location}</div></div>
        <div class="info-card"><div class="info-label">${lang.fieldGenre}</div><div class="info-val">${drama.genre}</div></div>
        <div class="info-card col-2"><div class="info-label">${lang.fieldOtt}</div><div class="info-val">${drama.ott}</div></div>
      </div>
      <div class="i18n-section">
        <div class="i18n-title">${lang.multiLang}</div>
        <div class="i18n-grid">
          <div class="i18n-item"><span class="i18n-lang">한국어</span><span class="i18n-text">${site.i18n.ko}</span></div>
          <div class="i18n-item"><span class="i18n-lang">English</span><span class="i18n-text">${site.i18n.en}</span></div>
          <div class="i18n-item"><span class="i18n-lang">中文</span><span class="i18n-text">${site.i18n.zh}</span></div>
          <div class="i18n-item"><span class="i18n-lang">日本語</span><span class="i18n-text">${site.i18n.ja}</span></div>
        </div>
      </div>`;
    setSheetOpen(true);
    renderDramaPanel();
  }

  // ── 한류 모드 진입/해제 ──
  function enterHallyuMode(dramas, searchLabel) {
    hallyuMode = true;
    document.getElementById('hallyuTab').classList.add('active');
    document.querySelectorAll('.tab[data-s]').forEach(t => {
      if (t.dataset.s !== 'hallyu') t.classList.remove('active');
    });
    document.getElementById('legend').classList.add('hidden');
    clearOverlays();
    addDramaPins(dramas || DRAMA_DATA);
    if (_hallyuCache) {
      _hallyuCache.forEach(place => {
        const name = place.i18n ? (place.i18n[currentLang] || place.name) : place.name;
        addOverlay(place.lat, place.lng,
          makePinEl('#a855f7', () => openPlace(place), false, false, `${name} 여행지`)
        );
      });
    }
    if (bfMode) addBFPins();
    renderDramaStrip(dramas || DRAMA_DATA);
    renderDramaPanel(searchLabel || null);
    setSheetOpen(false);
  }

  function exitHallyuMode() {
    hallyuMode = false; activeDramaId = null; activeSiteId = null;
    document.getElementById('hallyuTab').classList.remove('active');
    document.getElementById('legend').classList.remove('hidden');
    refreshPins();
    if (bfMode) {
      renderBFStrip();
      renderBFPanel();
    } else {
      renderSeasonStrip(currentSeason);
      renderSeasonPanel(null);
      refreshSeasonTrend(currentSeason);
    }
    setSheetOpen(false);
  }

  // ── 언어 전환 ──
  const HTML_LANG_MAP = { ko: 'ko', en: 'en', zh: 'zh-Hans', ja: 'ja' };

  function applyLanguage() {
    const lang = L();
    // 문서 언어 속성 동기화 (스크린리더가 올바른 언어 발음 규칙으로 읽도록)
    document.documentElement.lang = HTML_LANG_MAP[currentLang] || 'ko';
    // 탭 이름
    document.querySelectorAll('.tab[data-s]').forEach(tab => {
      const key = tab.dataset.s;
      if (lang.tabs[key]) tab.textContent = lang.tabs[key];
    });
    // 무장애 버튼 + 힌트
    document.getElementById('bfToggleBtn').textContent = lang.bfToggle;
    document.getElementById('bfToggleHint').textContent = bfMode ? lang.bfHintActive : lang.bfHint;
    // 반값 여행 버튼
    document.getElementById('hpMobileBtn').textContent = lang.hpMobile;
    // 검색 placeholder
    document.getElementById('searchInput').placeholder = lang.searchPlaceholder;
    // 언어 버튼 active 상태
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });
    // 핀 범례
    const leg = lang.legend;
    document.getElementById('legendDay').textContent      = leg.day;
    document.getElementById('legendOneNight').textContent = leg.oneNight;
    document.getElementById('legendTwoNight').textContent = leg.twoNight;
    document.getElementById('legendHallyu').textContent   = leg.hallyu;
    document.getElementById('legendBF').textContent       = leg.bf;
    // 시트 초기 안내문구 (장소 미선택 상태)
    if (_sheetEmpty) {
      document.getElementById('sheetPlace').textContent = lang.sheetEmptyTitle;
      document.getElementById('sheetBody').innerHTML = `<p class="sheet-desc">${lang.sheetEmptyDesc}</p>`;
    } else if (_lastOpened && document.getElementById('sheet').classList.contains('open')) {
      // 열려있는 바텀시트를 새 언어로 재렌더
      if (_lastOpened.kind === 'place')       openPlace(_lastOpened.data);
      else if (_lastOpened.kind === 'bf')     openBFPlace(_lastOpened.data);
      else if (_lastOpened.kind === 'drama')  openDramaSite(_lastOpened.data, _lastOpened.drama);
    }
    // 반값 배너
    updateHPBanner();
    // 패널 재렌더
    if (hallyuMode) {
      renderDramaPanel();
      renderDramaStrip(activeDramaId ? DRAMA_DATA.filter(d => d.id === activeDramaId) : DRAMA_DATA);
    } else if (bfMode) {
      renderBFStrip();
      renderBFPanel();
    } else {
      renderSeasonStrip(currentSeason);
      renderSeasonPanel(null);
      refreshSeasonTrend(currentSeason);
    }
  }

  // ── 언어 버튼 이벤트 (다국어 API 재조회 + KO fallback) ──
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (btn.dataset.lang === currentLang) return;
      currentLang = btn.dataset.lang;
      // 캐시 초기화 → 새 언어 API로 재조회
      Object.keys(_seasonCache).forEach(k => delete _seasonCache[k]);
      Object.keys(_trendCache).forEach(k => delete _trendCache[k]);
      Object.keys(_bfCache).forEach(k => delete _bfCache[k]);
      _bfKeywordCache = null;
      _hallyuCache = null;
      if (USE_REAL_API) {
        showSpinner();
        try {
          if (hallyuMode)      { await loadHallyuData(); }
          else if (bfMode)     { await loadBFData(currentSeason); }
          else                 { await loadSeasonData(currentSeason); }
        } catch(e) { console.warn('[SeasonRoad] 언어 전환 API 재조회 실패:', e); }
        finally { hideSpinner(); }
      }
      refreshPins();
      applyLanguage();
    });
  });

  // ── 트렌드 아코디언 토글 (모바일) ──
  bindActivatable(document.getElementById('trendStripHeader'), () => {
    if (window.innerWidth > 768) return;
    const strip  = document.getElementById('trendStrip');
    const body   = document.getElementById('trendBody');
    const header = document.getElementById('trendStripHeader');
    if (!strip || !body) return;
    if (strip.classList.contains('expanded')) {
      collapseTrendStrip();
    } else {
      strip.classList.add('expanded');
      const totalH = 44 + body.scrollHeight + 2;
      document.documentElement.style.setProperty('--trend-h', totalH + 'px');
      if (header) { header.setAttribute('aria-expanded', 'true'); header.setAttribute('aria-label', '트렌드 목록 접기'); }
      setTimeout(() => { map.relayout(); }, 300);
    }
  });

  // ── 무장애 토글 ──
  document.getElementById('bfToggleBtn').addEventListener('click', async () => {
    bfMode = !bfMode;
    const btn          = document.getElementById('bfToggleBtn');
    const hint         = document.getElementById('bfToggleHint');
    const bfLegendRow  = document.getElementById('bfLegendRow');
    const lang         = L();

    if (bfMode) {
      if (USE_REAL_API && _bfCache[currentSeason] === undefined) {
        showSpinner();
        try { await loadBFData(currentSeason); } catch(e) { console.warn('무장애 API 실패, 더미 데이터 사용:', e); }
        finally { hideSpinner(); }
      }
      btn.classList.add('active');
      bfLegendRow.style.display = 'flex';
      hint.textContent = lang.bfHintActive;
      refreshPins();
      if (!hallyuMode) { renderBFStrip(); renderBFPanel(); }
      setSheetOpen(false);
    } else {
      btn.classList.remove('active');
      bfLegendRow.style.display = 'none';
      hint.textContent = lang.bfHint;
      activeBFId = null;
      refreshPins();
      if (hallyuMode) {
        renderDramaStrip(activeDramaId ? DRAMA_DATA.filter(d => d.id === activeDramaId) : DRAMA_DATA);
        renderDramaPanel();
      } else {
        renderSeasonStrip(currentSeason);
        renderSeasonPanel(null);
        refreshSeasonTrend(currentSeason);
      }
      setSheetOpen(false);
    }
  });

  // ── 검색 ──
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  const searchBarEl = document.getElementById('searchBar');

  searchInput.addEventListener('focus', () => searchBarEl.classList.add('focused'));
  searchInput.addEventListener('blur',  () => searchBarEl.classList.remove('focused'));

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    searchClear.style.display = q ? 'block' : 'none';
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(() => handleSearch(q), 280);
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = ''; searchClear.style.display = 'none';
    activeDramaId = null; activeSiteId = null;
    exitHallyuMode();
  });

  function handleSearch(q) {
    if (!q) { if (hallyuMode) renderDramaPanel(); return; }
    const lower   = q.toLowerCase();
    const matched = DRAMA_DATA.filter(d =>
      d.title.includes(q) ||
      d.titleEn.toLowerCase().includes(lower) ||
      d.sites.some(s => s.name.includes(q) || s.location.includes(q))
    );
    if (matched.length) {
      activeDramaId = null; activeSiteId = null;
      enterHallyuMode(matched, q);
      fitBounds(matched.flatMap(d => d.sites));
    } else {
      enterHallyuMode([], q);
      clearOverlays();
      document.getElementById('panelContent').innerHTML =
        `<div class="empty-state">${L().searchNoResult(q)}</div>`;
      announce(L().searchNoResult(q));
      const _noLabel = document.getElementById('trendLabel');
      const _noBody  = document.getElementById('trendBody');
      if (_noLabel) _noLabel.textContent = L().searchNoResultLabel;
      if (_noBody)  _noBody.innerHTML = '';
      collapseTrendStrip();
    }
  }

  // ── 탭 이벤트 ──
  document.querySelectorAll('.tab[data-s]').forEach(tab => {
    tab.addEventListener('click', async () => {
      if (tab.dataset.s === 'hallyu') {
        searchInput.value = ''; searchClear.style.display = 'none';
        activeDramaId = null; activeSiteId = null;
        if (USE_REAL_API && _hallyuCache === null) {
          showSpinner();
          try { await loadHallyuData(); } catch(e) { console.warn('한류 API 실패, 더미 데이터 사용:', e); }
          finally { hideSpinner(); }
        }
        enterHallyuMode(DRAMA_DATA, null);
      } else {
        searchInput.value = ''; searchClear.style.display = 'none';
        currentSeason = tab.dataset.s;
        document.querySelectorAll('.tab[data-s]').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const needsSeasonLoad = USE_REAL_API && !_seasonCache[currentSeason];
        const needsBFLoad     = bfMode && USE_REAL_API && _bfCache[currentSeason] === undefined;
        if (needsSeasonLoad || needsBFLoad) {
          showSpinner();
          try {
            await Promise.all([
              needsSeasonLoad ? loadSeasonData(currentSeason).catch(e => console.warn(`${currentSeason} API 실패, 더미 데이터 사용:`, e)) : null,
              needsBFLoad     ? loadBFData(currentSeason).catch(e => console.warn(`${currentSeason} 무장애 API 실패, 더미 데이터 사용:`, e)) : null,
            ]);
          } finally { hideSpinner(); }
        }
        exitHallyuMode();
      }
    });
  });

  // ── 바텀시트 핸들 ──
  bindActivatable(document.getElementById('sheetHandle'), () => {
    setSheetOpen(!document.getElementById('sheet').classList.contains('open'));
  });

  // 지도 클릭 → 바텀시트 닫기
  kakao.maps.event.addListener(map, 'click', () => {
    if (_pinClicked) return;
    setSheetOpen(false);
  });

  // ── 초기 렌더링 (더미 데이터로 즉시 표시) ──
  updateHPBanner();
  renderSeasonPins('spring');
  renderSeasonStrip('spring');
  renderSeasonPanel(null);

  // ── 초기 API 로드 (spring, 백그라운드) ──
  if (USE_REAL_API) {
    showSpinner();
    loadSeasonData('spring')
      .then(() => {
        if (!hallyuMode && currentSeason === 'spring') {
          refreshPins();
          renderSeasonStrip('spring');
          renderSeasonPanel(null);
          refreshSeasonTrend('spring');
        }
      })
      .catch(e => console.warn('초기 API 로드 실패, 더미 데이터 유지:', e))
      .finally(() => hideSpinner());
  }

}); // kakao.maps.load 끝
</script>

</div><!-- /app-wrapper -->
</body>
</html>
