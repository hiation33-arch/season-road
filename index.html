<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Season Road — 계절로 떠나는 여행 코스</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <style>
    :root {
      --primary-500: #22c55e;
      --primary-400: #4ade80;
      --primary-100: #dcfce7;
      --primary-900: #14532d;
      --hallyu-500: #a855f7;
      --hallyu-100: #faf5ff;
      --hallyu-900: #6b21a8;
      --gray-900: #111827;
      --gray-600: #4b5563;
      --gray-400: #9ca3af;
      --gray-200: #e5e7eb;
      --gray-100: #f3f4f6;
      --white: #ffffff;
      --header-h: 56px;
      --tab-h: 48px;
      --bf-h: 40px;
      --trend-h: 44px;
      --barrier-500: #f59e0b;
      --barrier-100: #fffbeb;
      --barrier-900: #92400e;
      --hp-500: #f59e0b;
      --hp-100: #fef3c7;
      --font: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      --shadow-card: 0 1px 4px rgba(0,0,0,0.08);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.12);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font); background: var(--gray-100); color: var(--gray-900); overflow: hidden; }

    /* ── 헤더 ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center; padding: 0 14px; gap: 10px; z-index: 300;
    }
    .logo { font-size: 17px; font-weight: 800; color: var(--primary-500); white-space: nowrap; letter-spacing: -0.5px; flex-shrink: 0; }
    .logo span { color: var(--gray-900); }
    .search-bar {
      flex: 1; display: flex; align-items: center;
      background: var(--gray-100); border-radius: 10px; padding: 0 12px; height: 38px; gap: 8px;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .search-bar.focused { background: var(--white); box-shadow: 0 0 0 2px var(--hallyu-500); }
    .search-bar svg { flex-shrink: 0; color: var(--gray-400); }
    .search-bar input {
      flex: 1; border: none; background: transparent;
      font-family: var(--font); font-size: 14px; color: var(--gray-900); outline: none;
    }
    .search-bar input::placeholder { color: var(--gray-400); }
    .search-clear {
      display: none; border: none; background: none; cursor: pointer;
      color: var(--gray-400); font-size: 16px; line-height: 1; padding: 2px 4px;
      border-radius: 50%; transition: background 0.12s;
    }
    .search-clear:hover { background: var(--gray-200); }

    /* ── 언어 선택 ── */
    .lang-selector { display: flex; gap: 3px; flex-shrink: 0; }
    .lang-btn {
      padding: 4px 7px; border: 1px solid var(--gray-200); border-radius: 6px;
      background: var(--white); font-family: var(--font); font-size: 11px; font-weight: 600;
      color: var(--gray-400); cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .lang-btn:hover { border-color: var(--gray-400); color: var(--gray-600); }
    .lang-btn.active { background: var(--gray-900); color: var(--white); border-color: var(--gray-900); }

    /* ── 탭 바 ── */
    .season-tabs {
      position: fixed; top: var(--header-h); left: 0; right: 0;
      height: var(--tab-h);
      background: var(--white); border-bottom: 1px solid var(--gray-200);
      display: flex; z-index: 300;
    }
    .tab {
      flex: 1; border: none; background: transparent;
      font-family: var(--font); font-size: 14px; font-weight: 500; color: var(--gray-400);
      cursor: pointer; border-bottom: 2.5px solid transparent;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .tab.active[data-s="spring"] { background: #fef9c3; color: #78350f; border-bottom-color: #fde047; font-weight: 700; }
    .tab.active[data-s="summer"] { background: #dcfce7; color: #14532d; border-bottom-color: #4ade80; font-weight: 700; }
    .tab.active[data-s="autumn"] { background: #ffedd5; color: #7c2d12; border-bottom-color: #fb923c; font-weight: 700; }
    .tab.active[data-s="winter"] { background: #e0f2fe; color: #0c4a6e; border-bottom-color: #38bdf8; font-weight: 700; }
    .hallyu-tab.active { background: var(--hallyu-100); color: var(--hallyu-900); border-bottom-color: var(--hallyu-500); font-weight: 700; }

    /* ── 무장애 토글 행 ── */
    .bf-toggle-row {
      position: fixed; top: calc(var(--header-h) + var(--tab-h));
      left: 0; right: 0; height: var(--bf-h);
      background: var(--white); border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center; padding: 0 14px; gap: 10px; z-index: 295;
    }
    .bf-toggle-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 14px; border: 1.5px solid var(--gray-200); border-radius: 20px;
      background: var(--white); font-family: var(--font); font-size: 13px; font-weight: 600;
      color: var(--gray-600); cursor: pointer; white-space: nowrap;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }
    .bf-toggle-btn:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--gray-400);
    }
    .bf-toggle-btn.active {
      background: var(--barrier-500);
      border-color: var(--barrier-500);
      color: var(--white);
      box-shadow: 0 4px 12px rgba(245,158,11,0.4);
    }
    .bf-toggle-hint {
      font-size: 11px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bf-chip {
      display: flex; align-items: center; gap: 5px;
      background: var(--barrier-100); border-radius: 20px; padding: 5px 11px;
      font-size: 12px; font-weight: 500; color: var(--barrier-900);
      white-space: nowrap; cursor: pointer; flex-shrink: 0;
      border: 1px solid #fed7aa; transition: background 0.15s, transform 0.1s;
    }
    .bf-chip:active { background: #fde68a; transform: scale(0.97); }
    .acc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
    .acc-item {
      display: flex; align-items: center; gap: 7px; font-size: 12px;
      background: var(--gray-100); border-radius: 8px; padding: 7px 10px;
      color: var(--gray-900); box-shadow: var(--shadow-card);
    }
    .acc-item .acc-icon { font-size: 14px; flex-shrink: 0; }
    .acc-label { font-size: 11px; color: var(--gray-600); }
    .bf-course-card {
      border: 1.5px solid #fed7aa; border-radius: 12px; padding: 12px 14px;
      margin-bottom: 8px; cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .bf-course-card:hover { background: var(--barrier-100); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
    .bf-course-title { font-size: 13px; font-weight: 700; color: var(--gray-900); margin-bottom: 3px; }
    .bf-course-desc  { font-size: 11px; color: var(--gray-400); line-height: 1.5; }
    .bf-place-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 10px; cursor: pointer; transition: background 0.15s;
    }
    .bf-place-item:hover { background: var(--gray-100); }
    .bf-place-item.active { background: var(--barrier-100); }
    .bf-pin-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--barrier-500); flex-shrink: 0; }
    .bf-place-name { font-size: 13px; font-weight: 600; color: var(--gray-900); flex: 1; }
    .bf-place-loc  { font-size: 11px; color: var(--gray-400); white-space: nowrap; }

    /* ── 반값 여행 배너 (사이드패널) ── */
    .hp-side-banner {
      display: block; text-decoration: none;
      background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
      border: 1.5px solid var(--hp-500); border-radius: 14px; padding: 12px 14px;
      margin-bottom: 14px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(245,158,11,0.15);
      transition: box-shadow 0.18s, transform 0.15s;
    }
    .hp-side-banner:hover { box-shadow: 0 4px 14px rgba(245,158,11,0.25); transform: translateY(-1px); }
    .hp-banner-title { font-size: 13px; font-weight: 700; color: #92400e; margin-bottom: 4px; }
    .hp-banner-desc  { font-size: 12px; color: #78350f; line-height: 1.5; margin-bottom: 2px; }
    .hp-banner-meta  { font-size: 11px; color: #a16207; line-height: 1.6; }
    .hp-banner-link  { display: inline-block; margin-top: 6px; font-size: 11px; font-weight: 700; color: #d97706; }

    /* ── 반값 여행 팝업 배지 (시트 내) ── */
    .hp-sheet-badge {
      display: flex; align-items: center; gap: 8px;
      background: linear-gradient(90deg, #fef3c7, #fffbeb);
      border: 1.5px solid var(--hp-500); border-radius: 10px;
      padding: 9px 12px; margin-bottom: 12px;
      font-size: 12px; font-weight: 700; color: #92400e;
    }

    /* ── 트렌드 스트립 (모바일) ── */
    .trend-strip {
      position: fixed; top: calc(var(--header-h) + var(--tab-h) + var(--bf-h)); left: 0; right: 0;
      height: var(--trend-h); background: var(--white); border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center; padding: 0 12px; gap: 8px;
      overflow-x: auto; overflow-y: hidden; scrollbar-width: none; z-index: 290;
      -webkit-overflow-scrolling: touch;
    }
    .trend-strip::-webkit-scrollbar { display: none; }
    .trend-label { font-size: 11px; font-weight: 700; color: var(--gray-400); white-space: nowrap; flex-shrink: 0; }
    .trend-chip {
      display: flex; align-items: center; gap: 5px;
      background: var(--gray-100); border-radius: 20px; padding: 5px 11px;
      font-size: 12px; font-weight: 500; color: var(--gray-900);
      white-space: nowrap; cursor: pointer; flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    }
    .trend-chip:active { background: var(--gray-200); transform: scale(0.97); }
    .trend-chip.drama-chip { background: var(--hallyu-100); color: var(--hallyu-900); }
    .trend-chip.drama-chip:active { background: #ede9fe; }
    .trend-rank { font-size: 11px; font-weight: 700; min-width: 14px; text-align: center; }
    .trend-rank.rank-1 { color: #ef4444; }
    .trend-rank.rank-2 { color: #f97316; }
    .trend-rank.rank-3 { color: #eab308; }
    .trend-rank.rank-4, .trend-rank.rank-5 { color: var(--gray-400); }

    /* ── 지도 ── */
    #map {
      position: fixed;
      top: calc(var(--header-h) + var(--tab-h) + var(--bf-h) + var(--trend-h));
      left: 0; right: 0; bottom: 0;
      height: calc(100dvh - var(--header-h) - var(--tab-h) - var(--bf-h) - var(--trend-h));
    }

    /* ── 범례 ── */
    .legend {
      position: fixed;
      top: calc(var(--header-h) + var(--tab-h) + var(--bf-h) + var(--trend-h) + 12px);
      right: 12px;
      background: var(--white); border-radius: 12px; padding: 10px 12px;
      box-shadow: var(--shadow-card); z-index: 200;
      display: flex; flex-direction: column; gap: 6px;
      transition: opacity 0.2s;
    }
    .legend.hidden { opacity: 0; pointer-events: none; }
    .legend-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--gray-600); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── 바텀시트 ── */
    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: var(--white); border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.10); z-index: 400;
      max-height: 80vh; display: flex; flex-direction: column;
      transform: translateY(calc(100% - 52px));
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle-area {
      padding: 10px 16px 12px; cursor: pointer; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .sheet-handle { width: 36px; height: 4px; background: var(--gray-200); border-radius: 2px; }
    .sheet-title-row { width: 100%; display: flex; align-items: center; gap: 8px; }
    .sheet-place { font-size: 17px; font-weight: 700; color: var(--gray-900); }
    .sheet-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
    .sheet-body { padding: 0 16px 32px; overflow-y: auto; flex: 1; }
    .sheet-desc { font-size: 14px; color: var(--gray-600); line-height: 1.65; margin-bottom: 12px; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .tag { font-size: 12px; color: var(--primary-900); background: var(--primary-100); padding: 4px 10px; border-radius: 20px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .info-card { background: var(--gray-100); border-radius: 12px; padding: 10px 12px; box-shadow: var(--shadow-card); }
    .info-label { font-size: 11px; color: var(--gray-400); margin-bottom: 3px; }
    .info-val   { font-size: 14px; font-weight: 600; color: var(--gray-900); }
    .col-2 { grid-column: 1 / -1; }

    /* ── 다국어 그리드 ── */
    .i18n-section { margin-top: 14px; }
    .i18n-title { font-size: 12px; font-weight: 700; color: var(--gray-400); margin-bottom: 8px; }
    .i18n-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .i18n-item { background: var(--gray-100); border-radius: 8px; padding: 7px 10px; box-shadow: var(--shadow-card); }
    .i18n-lang { font-size: 10px; font-weight: 700; color: var(--gray-400); display: block; margin-bottom: 2px; }
    .i18n-text { font-size: 12px; font-weight: 500; color: var(--gray-900); line-height: 1.4; }

    /* ── 핀 ── */
    .pin-wrap {
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.22));
      transition: transform 0.15s ease; user-select: none;
      position: relative;
    }
    .pin-wrap:active { transform: scale(0.92); }
    .pin-circle {
      width: 34px; height: 34px; border-radius: 50%; border: 2.5px solid #fff;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .pin-tail { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; margin-top: -1px; }
    .pin-hp-badge {
      position: absolute; top: -5px; right: -8px;
      font-size: 11px; background: white; border-radius: 50%;
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.28);
    }

    /* ── 사이드패널 공통 ── */
    .panel-section { margin-bottom: 20px; }
    .panel-section-title { font-size: 13px; font-weight: 700; color: var(--gray-600); margin-bottom: 10px; }
    .panel-list { display: flex; flex-direction: column; gap: 2px; }
    .panel-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 10px; cursor: pointer; transition: background 0.15s;
    }
    .panel-item:hover { background: var(--gray-100); }
    .panel-item:active { background: var(--gray-200); }
    .panel-rank { font-size: 13px; font-weight: 700; min-width: 18px; text-align: center; }
    .panel-rank.rank-1 { color: #ef4444; }
    .panel-rank.rank-2 { color: #f97316; }
    .panel-rank.rank-3 { color: #eab308; }
    .panel-rank.rank-4, .panel-rank.rank-5 { color: var(--gray-400); }
    .panel-item-text { font-size: 13px; font-weight: 500; color: var(--gray-900); flex: 1; line-height: 1.4; }
    .panel-item-sub  { font-size: 11px; color: var(--gray-400); white-space: nowrap; }
    .panel-divider { height: 1px; background: var(--gray-200); margin: 4px 0 18px; }
    .panel-place-card { border: 1px solid var(--gray-200); border-radius: 16px; padding: 16px; box-shadow: var(--shadow-card); }

    /* ── 드라마 카드 ── */
    .drama-card {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px; border-radius: 12px; cursor: pointer;
      border: 1.5px solid transparent;
      box-shadow: var(--shadow-card);
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      margin-bottom: 4px;
    }
    .drama-card:hover { background: var(--gray-100); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
    .drama-card.active { background: var(--hallyu-100); border-color: #e9d5ff; }
    .drama-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .drama-card-rank { font-size: 13px; font-weight: 700; min-width: 16px; flex-shrink: 0; margin-top: 1px; }
    .drama-card-info { flex: 1; min-width: 0; }
    .drama-card-title { font-size: 14px; font-weight: 600; color: var(--gray-900); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .drama-card-meta { font-size: 11px; color: var(--gray-400); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .drama-ott-badge { font-size: 10px; font-weight: 700; background: var(--hallyu-100); color: var(--hallyu-900); padding: 1px 6px; border-radius: 6px; }
    .drama-site-count { font-size: 11px; color: var(--hallyu-500); font-weight: 600; }
    .drama-reset-btn {
      width: 100%; padding: 8px; border: 1px solid var(--gray-200); border-radius: 8px;
      background: var(--white); font-family: var(--font); font-size: 12px; color: var(--gray-600);
      cursor: pointer; margin-bottom: 14px; transition: background 0.15s;
    }
    .drama-reset-btn:hover { background: var(--gray-100); }
    .drama-site-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 8px 10px; border-radius: 10px; cursor: pointer; transition: background 0.15s;
      border-left: 3px solid transparent;
    }
    .drama-site-item:hover { background: var(--gray-100); }
    .drama-site-item.active { background: var(--hallyu-100); border-left-color: var(--hallyu-500); }
    .drama-site-name { font-size: 13px; font-weight: 600; color: var(--gray-900); margin-bottom: 2px; }
    .drama-site-scene { font-size: 11px; color: var(--gray-400); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .empty-state { text-align: center; padding: 32px 16px; color: var(--gray-400); font-size: 13px; line-height: 1.7; }

    /* ── 데스크톱 ── */
    @media (min-width: 1024px) {
      #map { left: 360px; top: calc(var(--header-h) + var(--tab-h) + var(--bf-h)); height: calc(100dvh - var(--header-h) - var(--tab-h) - var(--bf-h)); }
      .legend { right: 24px; top: calc(var(--header-h) + var(--tab-h) + var(--bf-h) + 16px); }
      .trend-strip { display: none; }
      .side-panel {
        display: flex !important; flex-direction: column;
        position: fixed; top: calc(var(--header-h) + var(--tab-h) + var(--bf-h)); left: 0; width: 360px; bottom: 0;
        background: var(--white); border-right: 1px solid var(--gray-200);
        overflow-y: auto; z-index: 200; padding: 16px;
      }
      .sheet { display: none !important; }
    }
    .side-panel { display: none; }

    /* ── API 로딩 스피너 ── */
    .api-spinner {
      position: fixed; inset: 0; background: rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .spinner-inner {
      background: var(--white); border-radius: 16px;
      padding: 24px 32px; display: flex; flex-direction: column;
      align-items: center; gap: 12px; box-shadow: var(--shadow-md);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-circle {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--gray-200); border-top-color: var(--primary-500);
      animation: spin 0.7s linear infinite;
    }
    .spinner-text { font-size: 13px; color: var(--gray-600); font-weight: 500; }

    /* ── 모바일 375px 최적화 ── */
    @media (max-width: 380px) {
      .header { padding: 0 10px; gap: 7px; }
      .logo { font-size: 15px; }
      .lang-btn { padding: 3px 5px; font-size: 10px; }
      .tab { font-size: 12px; }
      .bf-toggle-btn { padding: 4px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>

<header class="header">

const _TK = { day:'#22c55e',   '1night':'#ef4444',   '2night':'#3b82f6' };

// ── API 공통 fetch ──
async function ktoFetch(endpoint, params = {}) {
  const qs = new URLSearchParams({
    serviceKey: KTO_API_KEY,
    numOfRows: 20, pageNo: 1,
    MobileOS: 'ETC', MobileApp: 'SeasonRoad', _type: 'json',
    ...params,
  });
  const res = await fetch(`${KTO_BASE_URL}/${endpoint}?${qs}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data  = await res.json();
  const items = data?.response?.body?.items?.item;
  if (!items) return [];
  return Array.isArray(items) ? items : [items];
}

// ── 변환 함수 ──
function _ktoToPlace(item, season) {
  const t = _TC[Math.abs(parseInt(item.contentid, 10) || 0) % 3];
  return {
    id: item.contentid, name: item.title,
    lat: parseFloat(item.mapy), lng: parseFloat(item.mapx),
    type: t, label: _TL[t], color: _TK[t],
    seasons: [season], desc: item.addr1 || '',
    tags: item.cat2 ? [`#${item.cat2}`] : ['#관광지'],
    duration: _TD[t], location: item.addr1 || '',
    i18n: { ko: item.title, en: item.title, zh: item.title, ja: item.title },
    apiId: item.contentid, image: item.firstimage || '',
  };
}

function _ktoToBF(item) {
  return {
    id: 'bf_' + item.contentid, name: item.title,
    lat: parseFloat(item.mapy), lng: parseFloat(item.mapx),
    type: 'day', label: '당일 코스', duration: '당일',
    location: item.addr1 || '', desc: item.addr1 || '',
    tags: ['#무장애', '#접근가능'],
    accessibility: { wheelchair:true, toilet:true, ramp:true, braille:false, parking:true },
    i18n: { ko: item.title, en: item.title, zh: item.title, ja: item.title },
    apiId: item.contentid, image: item.firstimage || '',
  };
}

// ── 계절 관광지 로드 (areaBasedList1 + searchFestival1) ──
async function loadSeasonData(season) {
  if (_seasonCache[season]) return _seasonCache[season];
  const SEASON_START = {
    spring:'20260301', summer:'20260601', autumn:'20260901', winter:'20261201',
  };
  const areaCodes = SEASON_AREA_CODES[season] || [1];
  const [spotResults, festivalItems] = await Promise.all([
    Promise.all(areaCodes.map(ac => ktoFetch('areaBasedList1', { areaCode: ac, contentTypeId: 12 }))),
    ktoFetch('searchFestival1', { eventStartDate: SEASON_START[season], contentTypeId: 15, numOfRows: 10 }),
  ]);
  const valid = i => i.mapx && i.mapy && parseFloat(i.mapx) !== 0 && parseFloat(i.mapy) !== 0;
  const spots     = spotResults.flat().filter(valid).map(i => _ktoToPlace(i, season));
  const festivals = festivalItems.filter(valid).map(i => _ktoToPlace(i, season));
  const all = [...spots, ...festivals];
  _seasonCache[season] = all.length ? all : null;
  return _seasonCache[season];
}

// ── 무장애 관광지 로드 (areaBasedList1) ──
async function loadBFData() {
  if (_bfCache) return _bfCache;
  const results = await Promise.all(
    [1, 6, 39, 32].map(ac => ktoFetch('areaBasedList1', { areaCode: ac, contentTypeId: 12, numOfRows: 8 }))
  );
  const places = results.flat()
    .filter(i => i.mapx && i.mapy)
    .map(_ktoToBF)
    .slice(0, 8);
  _bfCache = places.length ? places : null;
  return _bfCache;
}

// ── 한류 관광지 로드 (contentTypeId=85) ──
async function loadHallyuData() {
  if (_hallyuCache) return _hallyuCache;
  const items = await ktoFetch('areaBasedList1', { contentTypeId: 85, numOfRows: 20 });
  const places = items
    .filter(i => i.mapx && i.mapy && parseFloat(i.mapx) !== 0)
    .map(i => ({
      id: i.contentid, name: i.title,
      lat: parseFloat(i.mapy), lng: parseFloat(i.mapx),
      type: 'hallyu', label: '한류 촬영지', color: '#a855f7',
      seasons: ['spring','summer','autumn','winter'],
      desc: i.addr1 || '', tags: ['#한류관광'],
      duration: '반나절', location: i.addr1 || '',
      i18n: { ko: i.title, en: i.title, zh: i.title, ja: i.title },
      apiId: i.contentid, image: i.firstimage || '',
    }));
  _hallyuCache = places.length ? places : null;
  return _hallyuCache;
}

const BADGE_STYLE = {
  day:     { bg:'#dcfce7', color:'#14532d' },
  '1night':{ bg:'#fee2e2', color:'#991b1b' },
  '2night':{ bg:'#dbeafe', color:'#1e3a8a' },

};
const PIN_EMOJI  = { day:'🌿', '1night':'🌙', '2night':'⭐', hallyu:'🎬' };
const SEASON_EMO = { spring:'🌸', summer:'🌿', autumn:'🍂', winter:'❄️' };

// ── 현재 언어 상태 ──
let currentLang = 'ko';
function L() { return I18N[currentLang]; }

// ── 카카오맵 초기화 ──
kakao.maps.load(function () {
  const map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(36.5, 127.8), level: 7,
  });
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);

  // ── 상태 ──
  let currentSeason  = 'spring';
  let hallyuMode     = false;
  let bfMode         = false;
  let activeDramaId  = null;
  let activeSiteId   = null;
  let activeBFId     = null;
  let _pinClicked    = false;
  let _searchTimer   = null;

  // ── 지도 이동 ──
  function flyTo(lat, lng, level = 5) {
    map.setLevel(level);
    map.panTo(new kakao.maps.LatLng(lat, lng));
  }
  function fitBounds(sites) {
    if (!sites.length) return;
    if (sites.length === 1) { flyTo(sites[0].lat, sites[0].lng, 5); return; }
    const bounds = new kakao.maps.LatLngBounds();
    sites.forEach(s => bounds.extend(new kakao.maps.LatLng(s.lat, s.lng)));
    map.setBounds(bounds, 70);
  }

  // ── 핀 DOM 생성 ──
  let overlays = [];
  function clearOverlays() { overlays.forEach(o => o.setMap(null)); overlays = []; }

  function addOverlay(lat, lng, el) {
    const o = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(lat, lng),
      content: el, yAnchor: 1.0, zIndex: 3,
    });
    o.setMap(map);
    overlays.push(o);
  }

  function makePinEl(color, emoji, onClick, halfPrice = false) {
    const wrap   = document.createElement('div'); wrap.className = 'pin-wrap';
    const circle = document.createElement('div'); circle.className = 'pin-circle';
    circle.style.background = color; circle.textContent = emoji;
    const tail   = document.createElement('div'); tail.className = 'pin-tail';
    tail.style.borderTopColor = color;
    wrap.appendChild(circle); wrap.appendChild(tail);
    if (halfPrice) {
      const badge = document.createElement('div'); badge.className = 'pin-hp-badge';
      badge.textContent = '💰';
      wrap.appendChild(badge);
    }
    wrap.addEventListener('click', (e) => {
      e.stopPropagation(); _pinClicked = true;
      onClick();
      setTimeout(() => { _pinClicked = false; }, 0);
    });
    return wrap;
  }

  // ── 핀 추가 ──
  function addSeasonPins(season) {
    const places = _seasonCache[season] || PLACES.filter(p => p.seasons.includes(season));
    places.forEach(place => {
      addOverlay(place.lat, place.lng,
        makePinEl(place.color, PIN_EMOJI[place.type] || '📍', () => openPlace(place), isHalfPriceRegion(place.location))
      );
    });
  }

  function addDramaPins(dramas) {
    dramas.forEach(drama => {
      drama.sites.forEach(site => {
        addOverlay(site.lat, site.lng,
          makePinEl(drama.pinColor, '🎬', () => openDramaSite(site, drama))
        );
      });
    });
  }

  function addBFPins() {
    (_bfCache || BARRIER_FREE_DATA).forEach(place => {
      addOverlay(place.lat, place.lng,
        makePinEl('#f59e0b', '♿', () => openBFPlace(place))
      );
    });
  }

  // ── 통합 핀 갱신 ──
  function refreshPins() {
    clearOverlays();
    if (hallyuMode) {
      const dramas = activeDramaId ? DRAMA_DATA.filter(d => d.id === activeDramaId) : DRAMA_DATA;
      addDramaPins(dramas);
    } else {
      addSeasonPins(currentSeason);
    }
    if (bfMode) addBFPins();
  }

  function renderSeasonPins(season) { currentSeason = season; refreshPins(); }
  function renderDramaPins(dramas) {
    clearOverlays(); addDramaPins(dramas);
    if (bfMode) addBFPins();
  }

  // ── 반값 여행 사이드배너 갱신 ──
  function updateHPBanner() {
    const hp  = L().halfPrice;
    const el  = document.getElementById('hpSideBanner');
    el.innerHTML = `
      <div class="hp-banner-title">${hp.title}</div>
      <div class="hp-banner-desc">${hp.desc}</div>
      <div class="hp-banner-meta">${hp.limit}</div>
      <div class="hp-banner-meta">${hp.period}</div>
      <div class="hp-banner-link">${hp.link}</div>`;
  }

  // ── 모바일 스트립 ──
  function renderSeasonStrip(season) {
    const strip = document.getElementById('trendStrip');
    strip.innerHTML = '<span class="trend-label">🔥 트렌드</span>';
    const apiPlaces = _seasonCache[season];
    if (apiPlaces && apiPlaces.length) {
      apiPlaces.slice(0, 5).forEach((place, i) => {
        const chip = document.createElement('div'); chip.className = 'trend-chip';
        chip.innerHTML = `<span class="trend-rank rank-${i+1}">${i+1}</span>${place.name}`;
        chip.addEventListener('click', () => { flyTo(place.lat, place.lng); openPlace(place); });
        strip.appendChild(chip);
      });
    } else {
      (TREND_DATA[season] || []).forEach((item, i) => {
        const chip = document.createElement('div'); chip.className = 'trend-chip';
        chip.innerHTML = `<span class="trend-rank rank-${i+1}">${i+1}</span>${item.keyword}`;
        chip.addEventListener('click', () => {
          const place = PLACES.find(p => p.id === item.placeId);
          if (place) { flyTo(place.lat, place.lng); openPlace(place); }
        });
        strip.appendChild(chip);
      });
    }
  }

  function renderDramaStrip(dramas) {
    const strip = document.getElementById('trendStrip');
    strip.innerHTML = '<span class="trend-label">🎬 드라마</span>';
    dramas.forEach((d, i) => {
      const chip = document.createElement('div'); chip.className = 'trend-chip drama-chip';
      chip.innerHTML = `<span class="trend-rank rank-${Math.min(i+1,5)}">${i+1}</span>${d.title}`;
      chip.addEventListener('click', () => {
        activeDramaId = d.id; activeSiteId = null;
        renderDramaPins([d]); fitBounds(d.sites);
        renderDramaPanel();
      });
      strip.appendChild(chip);
    });
  }

  function renderBFStrip() {
    const bfPlaces = _bfCache || BARRIER_FREE_DATA;
    const strip = document.getElementById('trendStrip');
    strip.innerHTML = '<span class="trend-label">♿ 무장애</span>';
    bfPlaces.forEach(place => {
      const chip = document.createElement('div'); chip.className = 'bf-chip';
      chip.textContent = place.i18n ? (place.i18n[currentLang] || place.name) : place.name;
      chip.addEventListener('click', () => { flyTo(place.lat, place.lng, 5); openBFPlace(place); });
      strip.appendChild(chip);
    });
  }

  // ── 무장애 사이드패널 ──
  function renderBFPanel() {
    const panel    = document.getElementById('panelContent');
    const lang     = L();
    const bfPlaces = _bfCache || BARRIER_FREE_DATA;

    const courseCards = BF_COURSES.map(c => {
      const bs = BADGE_STYLE[c.type] || BADGE_STYLE.day;
      return `<div class="bf-course-card" data-course-id="${c.id}">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">
          <span class="bf-course-title">${c.name}</span>
          <span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:${bs.bg};color:${bs.color};white-space:nowrap">${c.type==='day'?'당일':c.type==='1night'?'1박 2일':'2박 3일'}</span>
        </div>
        <div class="bf-course-desc">${c.desc}</div>
      </div>`;
    }).join('');

    const placeItems = bfPlaces.map(place => {
      const name = place.i18n ? (place.i18n[currentLang] || place.name) : place.name;
      const isActive = place.id === activeBFId;
      return `<div class="bf-place-item ${isActive?'active':''}" data-bf-id="${place.id}">
        <div class="bf-pin-dot"></div>
        <span class="bf-place-name">${name}</span>
        <span class="bf-place-loc">${(place.location||'').split(' ')[0]}</span>
      </div>`;
    }).join('');

    panel.innerHTML = `
      <div class="panel-section">
        <div class="panel-section-title">${lang.bfCoursesTitle}</div>
        ${courseCards}
      </div>
      <div class="panel-divider"></div>
      <div class="panel-section">
        <div class="panel-section-title">${lang.bfPlaceListTitle}</div>
        <div id="bfPlaceList">${placeItems}</div>
      </div>`;

    panel.querySelectorAll('.bf-course-card').forEach(el => {
      el.addEventListener('click', () => {
        const course = BF_COURSES.find(c => c.id === el.dataset.courseId);
        if (!course) return;
        const places = course.placeIds.map(id => BARRIER_FREE_DATA.find(p => p.id === id)).filter(Boolean);
        fitBounds(places);
        renderBFPanel();
      });
    });

    panel.querySelectorAll('#bfPlaceList .bf-place-item').forEach(el => {
      el.addEventListener('click', () => {
        const place = bfPlaces.find(p => p.id === el.dataset.bfId);
        if (place) { flyTo(place.lat, place.lng, 5); openBFPlace(place); }
      });
    });
  }

  // ── 무장애 장소 상세 ──
  function openBFPlace(place) {
    activeBFId = place.id;
    const name = place.i18n ? (place.i18n[currentLang] || place.name) : place.name;
    document.getElementById('sheetPlace').textContent = name;
    const badge = document.getElementById('sheetBadge');
    badge.textContent = place.label;
    badge.style.background = '#fffbeb';
    badge.style.color = '#92400e';

    const accItems = Object.entries(place.accessibility).map(([key, val]) => {
      return `<div class="acc-item">
        <span class="acc-icon">${val ? '✅' : '❌'}</span>
        <span class="acc-label">${ACC_LABELS[key] || key}</span>
      </div>`;
    }).join('');

    document.getElementById('sheetBody').innerHTML = `
      <p class="sheet-desc">${place.desc}</p>
      <div class="tag-row">${place.tags.map(t=>`<span class="tag" style="background:#fffbeb;color:#92400e">${t}</span>`).join('')}</div>
      <div class="info-grid">
        <div class="info-card"><div class="info-label">코스 유형</div><div class="info-val">${place.label}</div></div>
        <div class="info-card"><div class="info-label">소요 기간</div><div class="info-val">${place.duration}</div></div>
        <div class="info-card col-2"><div class="info-label">위치</div><div class="info-val">${place.location}</div></div>
      </div>
      <div class="i18n-section">
        <div class="i18n-title">${L().accessibility}</div>
        <div class="acc-grid">${accItems}</div>
      </div>`;
    document.getElementById('sheet').classList.add('open');
    if (bfMode && !hallyuMode) renderBFPanel();
  }

  // ── 계절 사이드패널 ──
  function renderSeasonPanel(activePlace) {
    const panel     = document.getElementById('panelContent');
    const lang      = L();
    const apiPlaces = _seasonCache[currentSeason];
    const curPlaces = apiPlaces || PLACES.filter(p => p.seasons.includes(currentSeason));
    const top5      = curPlaces.slice(0, 5);
    const sEmo      = SEASON_EMO[currentSeason];
    const sName     = lang.seasonNames[currentSeason];

    const trends = apiPlaces
      ? apiPlaces.slice(0, 5).map(p => ({ keyword: p.name, placeId: p.id }))
      : (TREND_DATA[currentSeason] || []);

    const trendRows = trends.map((item, i) => {
      const p = curPlaces.find(q => q.id == item.placeId) || PLACES.find(q => q.id === item.placeId);
      return `<div class="panel-item" data-id="${item.placeId}">
        <span class="panel-rank rank-${i+1}">${i+1}</span>
        <span class="panel-item-text">${item.keyword}</span>
        ${p ? `<span class="panel-item-sub">${(p.location||'').split(' ')[0]}</span>` : ''}
      </div>`;
    }).join('');

    const top5Rows = top5.map((place, i) => {
      const bs   = BADGE_STYLE[place.type] || {};
      const name = place.i18n ? (place.i18n[currentLang] || place.name) : place.name;
      const isActive = activePlace && activePlace.id === place.id;
      return `<div class="panel-item" data-id="${place.id}" ${isActive?'style="background:var(--gray-100)"':''}>
        <span class="panel-rank rank-${i+1}">${i+1}</span>
        <span class="panel-item-text">${name}</span>
        <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:12px;background:${bs.bg};color:${bs.color}">${place.label}</span>
      </div>`;
    }).join('');

    const placeCard = activePlace ? (() => {
      const bs   = BADGE_STYLE[activePlace.type] || {};
      const name = activePlace.i18n ? (activePlace.i18n[currentLang] || activePlace.name) : activePlace.name;
      const hpBadge = isHalfPriceRegion(activePlace.location)
        ? `<div class="hp-sheet-badge">${L().halfPrice.badge}</div>` : '';
      return `<div class="panel-divider"></div>
        <div class="panel-place-card">
          ${hpBadge}
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <span style="font-size:17px;font-weight:700">${name}</span>
            <span style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:${bs.bg};color:${bs.color}">${activePlace.label}</span>
          </div>
          <p style="font-size:14px;color:#4b5563;line-height:1.65;margin-bottom:10px">${activePlace.desc}</p>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
            ${activePlace.tags.map(t=>`<span style="font-size:12px;color:#14532d;background:#dcfce7;padding:4px 10px;border-radius:20px">${t}</span>`).join('')}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div style="background:#f3f4f6;border-radius:12px;padding:10px 12px;box-shadow:var(--shadow-card)"><div style="font-size:11px;color:#9ca3af;margin-bottom:3px">소요 기간</div><div style="font-size:14px;font-weight:600">${activePlace.duration}</div></div>
            <div style="background:#f3f4f6;border-radius:12px;padding:10px 12px;box-shadow:var(--shadow-card)"><div style="font-size:11px;color:#9ca3af;margin-bottom:3px">위치</div><div style="font-size:14px;font-weight:600">${activePlace.location}</div></div>
          </div>
        </div>`;
    })() : '';

    panel.innerHTML = `
      <div class="panel-section">
        <div class="panel-section-title">${lang.trendTitle}</div>
        <div class="panel-list" id="trendList">${trendRows}</div>
      </div>
      <div class="panel-divider"></div>
      <div class="panel-section">
        <div class="panel-section-title">${lang.seasonTop5(sEmo, sName)}</div>
        <div class="panel-list" id="top5List">${top5Rows}</div>
      </div>
      ${placeCard}`;

    panel.querySelectorAll('#trendList .panel-item').forEach(el => {
      el.addEventListener('click', () => {
        const id  = el.dataset.id;
        const cur = _seasonCache[currentSeason] || PLACES.filter(p => p.seasons.includes(currentSeason));
        const place = cur.find(p => p.id == id) || PLACES.find(p => p.id === Number(id));
        if (place) { flyTo(place.lat, place.lng); openPlace(place); }
      });
    });
    panel.querySelectorAll('#top5List .panel-item').forEach(el => {
      el.addEventListener('click', () => {
        const id  = el.dataset.id;
        const cur = _seasonCache[currentSeason] || PLACES.filter(p => p.seasons.includes(currentSeason));
        const place = cur.find(p => p.id == id) || PLACES.find(p => p.id === Number(id));
        if (place) { flyTo(place.lat, place.lng); openPlace(place); }
      });
    });
  }

  // ── 드라마 사이드패널 ──
  function renderDramaPanel(searchLabel) {
    const panel  = document.getElementById('panelContent');
    const lang   = L();
    const dramas = activeDramaId ? DRAMA_DATA.filter(d => d.id === activeDramaId) : DRAMA_DATA;

    const resetBtn = activeDramaId
      ? `<button class="drama-reset-btn" id="dramaResetBtn">${lang.allDramas}</button>` : '';

    const dramaCards = dramas.map((d, i) => {
      const isActive  = d.id === activeDramaId;
      const rankClass = `rank-${Math.min(d.rank, 5)}`;
      return `<div class="drama-card ${isActive?'active':''}" data-drama-id="${d.id}">
        <div class="drama-color-dot" style="background:${d.pinColor}"></div>
        <span class="drama-card-rank ${rankClass}">${d.rank}</span>
        <div class="drama-card-info">
          <div class="drama-card-title">${d.title}</div>
          <div class="drama-card-meta">
            <span>${d.genre}</span>
            <span class="drama-ott-badge">${d.ott}</span>
            <span class="drama-site-count">📍 ${d.sites.length}개 촬영지</span>
          </div>
        </div>
      </div>`;
    }).join('');

    let siteList = '';
    if (activeDramaId) {
      const drama = DRAMA_DATA.find(d => d.id === activeDramaId);
      if (drama) {
        const items = drama.sites.map(s => {
          const siteName   = s.i18n ? (s.i18n[currentLang] || s.name) : s.name;
          const isActiveSite = s.id === activeSiteId;
          return `<div class="drama-site-item ${isActiveSite?'active':''}" data-site-id="${s.id}" data-drama-id="${drama.id}">
            <div>
              <div class="drama-site-name">${siteName}</div>
              <div class="drama-site-scene">${s.scene}</div>
            </div>
          </div>`;
        }).join('');
        siteList = `<div class="panel-divider"></div>
          <div class="panel-section">
            <div class="panel-section-title">${lang.filmingSites}</div>
            <div id="siteList">${items}</div>
          </div>`;
      }
    }

    const title = searchLabel
      ? `🔍 검색 결과: <span style="color:var(--hallyu-500)">${searchLabel}</span>`
      : lang.dramaTop5;

    panel.innerHTML = `
      <div class="panel-section">
        <div class="panel-section-title">${title}</div>
        ${resetBtn}
        <div id="dramaCardList">${dramaCards}</div>
      </div>
      ${siteList}`;

    panel.querySelectorAll('#dramaCardList .drama-card').forEach(el => {
      el.addEventListener('click', () => {
        const id    = el.dataset.dramaId;
        const drama = DRAMA_DATA.find(d => d.id === id);
        if (!drama) return;
        if (activeDramaId === id) {
          activeDramaId = null; activeSiteId = null;
          renderDramaPins(DRAMA_DATA); renderDramaPanel(searchLabel);
          map.setLevel(7); map.setCenter(new kakao.maps.LatLng(36.5, 127.8));
        } else {
          activeDramaId = id; activeSiteId = null;
          renderDramaPins([drama]); fitBounds(drama.sites);
          renderDramaPanel(searchLabel);
        }
      });
    });

    const resetBtn2 = panel.querySelector('#dramaResetBtn');
    if (resetBtn2) {
      resetBtn2.addEventListener('click', () => {
        activeDramaId = null; activeSiteId = null;
        const filtered = searchLabel
          ? DRAMA_DATA.filter(d => d.title.includes(searchLabel) || d.titleEn.toLowerCase().includes(searchLabel.toLowerCase()))
          : DRAMA_DATA;
        renderDramaPins(filtered);
        renderDramaPanel(searchLabel);
        map.setLevel(7); map.setCenter(new kakao.maps.LatLng(36.5, 127.8));
      });
    }

    panel.querySelectorAll('#siteList .drama-site-item').forEach(el => {
      el.addEventListener('click', () => {
        const siteId  = el.dataset.siteId;
        const dramaId = el.dataset.dramaId;
        const drama   = DRAMA_DATA.find(d => d.id === dramaId);
        const site    = drama && drama.sites.find(s => s.id === siteId);
        if (site && drama) { flyTo(site.lat, site.lng); openDramaSite(site, drama); }
      });
    });
  }

  // ── 장소 상세 (계절) ──
  function openPlace(place) {
    const bs   = BADGE_STYLE[place.type] || {};
    const name = place.i18n ? (place.i18n[currentLang] || place.name) : place.name;
    document.getElementById('sheetPlace').textContent = name;
    const badge = document.getElementById('sheetBadge');
    badge.textContent = place.label;
    badge.style.background = bs.bg || '#f3f4f6';
    badge.style.color      = bs.color || '#374151';

    const hpBadge = isHalfPriceRegion(place.location)
      ? `<div class="hp-sheet-badge">${L().halfPrice.badge}</div>` : '';

    document.getElementById('sheetBody').innerHTML = `
      ${hpBadge}
      <p class="sheet-desc">${place.desc}</p>
      <div class="tag-row">${place.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="info-grid">
        <div class="info-card"><div class="info-label">코스 유형</div><div class="info-val">${place.label}</div></div>
        <div class="info-card"><div class="info-label">소요 기간</div><div class="info-val">${place.duration}</div></div>
        <div class="info-card col-2"><div class="info-label">위치</div><div class="info-val">${place.location}</div></div>
      </div>`;
    document.getElementById('sheet').classList.add('open');
    renderSeasonPanel(place);
  }

  // ── 촬영지 상세 (드라마) ──
  function openDramaSite(site, drama) {
    activeSiteId = site.id;
    const siteName = site.i18n ? (site.i18n[currentLang] || site.name) : site.name;
    document.getElementById('sheetPlace').textContent = siteName;
    const badge = document.getElementById('sheetBadge');
    badge.textContent = drama.title;
    badge.style.background = '#faf5ff';
    badge.style.color = '#6b21a8';
    document.getElementById('sheetBody').innerHTML = `
      <p class="sheet-desc">${site.scene}</p>
      <div class="info-grid">
        <div class="info-card"><div class="info-label">위치</div><div class="info-val">${site.location}</div></div>
        <div class="info-card"><div class="info-label">장르</div><div class="info-val">${drama.genre}</div></div>
        <div class="info-card col-2"><div class="info-label">OTT 플랫폼</div><div class="info-val">${drama.ott}</div></div>
      </div>
      <div class="i18n-section">
        <div class="i18n-title">${L().multiLang}</div>
        <div class="i18n-grid">
          <div class="i18n-item"><span class="i18n-lang">한국어</span><span class="i18n-text">${site.i18n.ko}</span></div>
          <div class="i18n-item"><span class="i18n-lang">English</span><span class="i18n-text">${site.i18n.en}</span></div>
          <div class="i18n-item"><span class="i18n-lang">中文</span><span class="i18n-text">${site.i18n.zh}</span></div>
          <div class="i18n-item"><span class="i18n-lang">日本語</span><span class="i18n-text">${site.i18n.ja}</span></div>
        </div>
      </div>`;
    document.getElementById('sheet').classList.add('open');
    renderDramaPanel();
  }

  // ── 한류 모드 진입/해제 ──
  function enterHallyuMode(dramas, searchLabel) {
    hallyuMode = true;
    document.getElementById('hallyuTab').classList.add('active');
    document.querySelectorAll('.tab[data-s]').forEach(t => {
      if (t.dataset.s !== 'hallyu') t.classList.remove('active');
    });
    document.getElementById('legend').classList.add('hidden');
    clearOverlays();
    addDramaPins(dramas || DRAMA_DATA);
    if (_hallyuCache) {
      _hallyuCache.forEach(place => {
        addOverlay(place.lat, place.lng,
          makePinEl('#a855f7', '🎬', () => openPlace(place))
        );
      });
    }
    if (bfMode) addBFPins();
    renderDramaStrip(dramas || DRAMA_DATA);
    renderDramaPanel(searchLabel || null);
  }

  function exitHallyuMode() {
    hallyuMode = false; activeDramaId = null; activeSiteId = null;
    document.getElementById('hallyuTab').classList.remove('active');
    document.getElementById('legend').classList.remove('hidden');
    refreshPins();
    if (bfMode) {
      renderBFStrip();
      renderBFPanel();
    } else {
      renderSeasonStrip(currentSeason);
      renderSeasonPanel(null);
    }
    document.getElementById('sheet').classList.remove('open');
  }

  // ── 언어 전환 ──
  function applyLanguage() {
    const lang = L();
    // 탭 이름
    document.querySelectorAll('.tab[data-s]').forEach(tab => {
      const key = tab.dataset.s;
      if (lang.tabs[key]) tab.textContent = lang.tabs[key];
    });
    // 무장애 버튼 + 힌트
    document.getElementById('bfToggleBtn').textContent = lang.bfToggle;
    document.getElementById('bfToggleHint').textContent = bfMode ? lang.bfHintActive : lang.bfHint;
    // 검색 placeholder
    document.getElementById('searchInput').placeholder = lang.searchPlaceholder;
    // 언어 버튼 active 상태
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });
    // 반값 배너
    updateHPBanner();
    // 패널 재렌더
    if (hallyuMode) {
      renderDramaPanel();
      renderDramaStrip(activeDramaId ? DRAMA_DATA.filter(d => d.id === activeDramaId) : DRAMA_DATA);
    } else if (bfMode) {
      renderBFStrip();
      renderBFPanel();
    } else {
      renderSeasonStrip(currentSeason);
      renderSeasonPanel(null);
    }
  }

  // ── 언어 버튼 이벤트 ──
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentLang = btn.dataset.lang;
      applyLanguage();
    });
  });

  // ── 무장애 토글 ──
  document.getElementById('bfToggleBtn').addEventListener('click', async () => {
    bfMode = !bfMode;
    const btn          = document.getElementById('bfToggleBtn');
    const hint         = document.getElementById('bfToggleHint');
    const bfLegendRow  = document.getElementById('bfLegendRow');
    const lang         = L();

    if (bfMode) {
      if (USE_REAL_API && !_bfCache) {
        showSpinner();
        try { await loadBFData(); } catch(e) { console.warn('무장애 API 실패, 더미 데이터 사용:', e); }
        finally { hideSpinner(); }
      }
      btn.classList.add('active');
      bfLegendRow.style.display = 'flex';
      hint.textContent = lang.bfHintActive;
      refreshPins();
      if (!hallyuMode) { renderBFStrip(); renderBFPanel(); }
    } else {
      btn.classList.remove('active');
      bfLegendRow.style.display = 'none';
      hint.textContent = lang.bfHint;
      activeBFId = null;
      refreshPins();
      if (hallyuMode) {
        renderDramaStrip(activeDramaId ? DRAMA_DATA.filter(d => d.id === activeDramaId) : DRAMA_DATA);
        renderDramaPanel();
      } else {
        renderSeasonStrip(currentSeason);
        renderSeasonPanel(null);
      }
      document.getElementById('sheet').classList.remove('open');
    }
  });

  // ── 검색 ──
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  const searchBarEl = document.getElementById('searchBar');

  searchInput.addEventListener('focus', () => searchBarEl.classList.add('focused'));
  searchInput.addEventListener('blur',  () => searchBarEl.classList.remove('focused'));

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    searchClear.style.display = q ? 'block' : 'none';
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(() => handleSearch(q), 280);
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = ''; searchClear.style.display = 'none';
    activeDramaId = null; activeSiteId = null;
    exitHallyuMode();
  });

  function handleSearch(q) {
    if (!q) { if (hallyuMode) renderDramaPanel(); return; }
    const lower   = q.toLowerCase();
    const matched = DRAMA_DATA.filter(d =>
      d.title.includes(q) ||
      d.titleEn.toLowerCase().includes(lower) ||
      d.sites.some(s => s.name.includes(q) || s.location.includes(q))
    );
    if (matched.length) {
      activeDramaId = null; activeSiteId = null;
      enterHallyuMode(matched, q);
      fitBounds(matched.flatMap(d => d.sites));
    } else {
      enterHallyuMode([], q);
      clearOverlays();
      document.getElementById('panelContent').innerHTML =
        `<div class="empty-state">🔍 "${q}"에 해당하는<br>드라마를 찾을 수 없습니다.<br><br>다른 키워드로 검색해보세요.</div>`;
      document.getElementById('trendStrip').innerHTML =
        `<span class="trend-label">검색 결과 없음</span>`;
    }
  }

  // ── 탭 이벤트 ──
  document.querySelectorAll('.tab[data-s]').forEach(tab => {
    tab.addEventListener('click', async () => {
      if (tab.dataset.s === 'hallyu') {
        searchInput.value = ''; searchClear.style.display = 'none';
        activeDramaId = null; activeSiteId = null;
        if (USE_REAL_API && !_hallyuCache) {
          showSpinner();
          try { await loadHallyuData(); } catch(e) { console.warn('한류 API 실패, 더미 데이터 사용:', e); }
          finally { hideSpinner(); }
        }
        enterHallyuMode(DRAMA_DATA, null);
      } else {
        searchInput.value = ''; searchClear.style.display = 'none';
        currentSeason = tab.dataset.s;
        document.querySelectorAll('.tab[data-s]').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        if (USE_REAL_API && !_seasonCache[currentSeason]) {
          showSpinner();
          try { await loadSeasonData(currentSeason); } catch(e) { console.warn(`${currentSeason} API 실패, 더미 데이터 사용:`, e); }
          finally { hideSpinner(); }
        }
        exitHallyuMode();
      }
    });
  });

  // ── 바텀시트 핸들 ──
  document.getElementById('sheetHandle').addEventListener('click', () => {
    document.getElementById('sheet').classList.toggle('open');
  });

  // 지도 클릭 → 바텀시트 닫기
  kakao.maps.event.addListener(map, 'click', () => {
    if (_pinClicked) return;
    document.getElementById('sheet').classList.remove('open');
  });

  // ── 초기 렌더링 (더미 데이터로 즉시 표시) ──
  updateHPBanner();
  renderSeasonPins('spring');
  renderSeasonStrip('spring');
  renderSeasonPanel(null);

  // ── 초기 API 로드 (spring, 백그라운드) ──
  if (USE_REAL_API) {
    showSpinner();
    loadSeasonData('spring')
      .then(() => {
        if (!hallyuMode && currentSeason === 'spring') {
          refreshPins();
          renderSeasonStrip('spring');
          renderSeasonPanel(null);
        }
      })
      .catch(e => console.warn('초기 API 로드 실패, 더미 데이터 유지:', e))
      .finally(() => hideSpinner());
  }

}); // kakao.maps.load 끝
</script>
</body>
</html>
